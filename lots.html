<script>
/* ============= Lots page logic — uses real LOTS_DATA from data/lots.js ============= */
(() => {
  const L = window.LTEX;
  const ICONS = window.ICONS;
  document.querySelectorAll('[data-icon]').forEach(el => {
    const n = el.dataset.icon;
    if(ICONS[n]) el.innerHTML = ICONS[n]();
  });

  const state = {
    productId: null,    // ?id=X — show only lots of this product
    barcode: null,      // ?barcode=X — scroll/highlight
    cat: null, sub: null,
    quality: [], season: [], audience: [], country: [],
    status: [],         // ['free','sale','reserved']
    priceMin:null, priceMax:null,
    weightMin:null, weightMax:null,
    q:'', sort:'stock', layout:'grid', page:1,
  };

  function readUrl(){
    const p = L.getParams();
    state.productId = p.id || null;
    state.barcode = p.barcode || null;
    state.cat = p.cat || null;
    state.sub = p.sub || null;
    state.quality = (p.quality||'').split(',').filter(Boolean);
    state.season = (p.season||'').split(',').filter(Boolean);
    state.audience = (p.audience||'').split(',').filter(Boolean);
    state.country = (p.country||'').split(',').filter(Boolean);
    state.status = (p.status||'').split(',').filter(Boolean);
    state.priceMin = p.priceMin ? parseFloat(p.priceMin) : null;
    state.priceMax = p.priceMax ? parseFloat(p.priceMax) : null;
    state.weightMin = p.weightMin ? parseFloat(p.weightMin) : null;
    state.weightMax = p.weightMax ? parseFloat(p.weightMax) : null;
    state.q = p.q || '';
    state.sort = p.sort || 'stock';
    state.layout = p.layout === 'list' ? 'list' : 'grid';
    state.page = Math.max(1, parseInt(p.page||'1',10) || 1);
  }

  function pushUrl(){
    L.setParams({
      id: state.productId || '',
      barcode: state.barcode || '',
      cat: state.cat, sub: state.sub,
      quality: state.quality, season: state.season,
      audience: state.audience, country: state.country,
      status: state.status,
      priceMin: state.priceMin || '', priceMax: state.priceMax || '',
      weightMin: state.weightMin || '', weightMax: state.weightMax || '',
      q: state.q, sort: state.sort,
      layout: state.layout === 'list' ? 'list' : '',
      page: state.page > 1 ? state.page : '',
    }, true);
  }

  /* Lazy lot-search index — built once on first query, reused thereafter.
     Each lot becomes a doc whose `_text` includes parent-product name/brand/
     category/sort/season/audience/country plus the lot's own barcode and
     description. */
  let _lotIndex = null;
  function ensureLotIndex(){
    if(_lotIndex) return _lotIndex;
    const all = L.getAllLots();
    _lotIndex = L.createSearchIndex(all, {
      getExtra: (l) => {
        const grp = l._grp || l.parentProd || {};
        return {
          name: grp.name || l.prodName,
          brand: grp.brand,
          subcategory: grp.subcategory,
          category: grp.category || grp.topCat,
          sort: grp.sort, season: grp.season,
          audience: grp.audience, country: grp.country,
          barcode: l.barcode,
          description: l.desc,
        };
      },
    });
    return _lotIndex;
  }

  /* === Filter pipeline (uses real LOTS_DATA from data/lots.js) === */
  function applyFilters(){
    let lots = L.getAllLots();

    if(state.productId){
      lots = lots.filter(l => String(l.prodId) === String(state.productId));
    }

    /* Use parent product attrs for filters (since lots.LOTS_DATA copies them onto _grp) */
    const parentOf = l => l._grp || (l.parentProd) || {};
    if(state.cat){
      lots = lots.filter(l => {
        const pp = l.parentProd || L.findProduct(l.prodId);
        return pp && pp.topCat === state.cat;
      });
    }
    if(state.sub){
      lots = lots.filter(l => {
        const grp = parentOf(l);
        return grp.subcategory === state.sub || grp.category === state.sub;
      });
    }
    if(state.quality.length) lots = lots.filter(l => state.quality.includes(parentOf(l).sort));
    if(state.season.length) lots = lots.filter(l => state.season.includes(parentOf(l).season));
    if(state.audience.length) lots = lots.filter(l => state.audience.includes(parentOf(l).audience));
    if(state.country.length) lots = lots.filter(l => state.country.includes(parentOf(l).country));

    if(state.status.length){
      lots = lots.filter(l => {
        const onSale = l.is_akciya;
        const free = !l.reserved && !onSale;
        const reserved = l.reserved;
        const s = onSale ? 'sale' : (reserved ? 'reserved' : 'free');
        return state.status.includes(s);
      });
    }

    if(state.priceMin != null) lots = lots.filter(l => (l.price_uah || 0) >= state.priceMin);
    if(state.priceMax != null) lots = lots.filter(l => (l.price_uah || 0) <= state.priceMax);
    if(state.weightMin != null) lots = lots.filter(l => (l.weight || 0) >= state.weightMin);
    if(state.weightMax != null) lots = lots.filter(l => (l.weight || 0) <= state.weightMax);

    if(state.q){
      /* Lot index is built once (lazily) and reused across keystrokes / filter
         changes. The index covers parent-product fields plus per-lot barcode
         and description, so the placeholder's "штрихкод" promise is honoured
         and lot-specific text (brand mixes, materials) is searchable. */
      const hits = ensureLotIndex().search(state.q, { minScore: 0.3 });
      const matched = new Set(hits.map(h => h.p));
      lots = lots.filter(l => matched.has(l));
    }

    if(state.sort === 'price_asc') lots = [...lots].sort((a,b) => (a.price_uah||1e12) - (b.price_uah||1e12));
    else if(state.sort === 'price_desc') lots = [...lots].sort((a,b) => (b.price_uah||0) - (a.price_uah||0));
    else if(state.sort === 'weight_desc') lots = [...lots].sort((a,b) => (b.weight||0) - (a.weight||0));
    else if(state.sort === 'weight_asc') lots = [...lots].sort((a,b) => (a.weight||1e12) - (b.weight||1e12));
    else if(state.sort === 'newest') lots = [...lots].sort((a,b) => parseInt(b.prodId) - parseInt(a.prodId));
    else {
      /* stock = parent product's qty_stock DESC, then by prodId DESC */
      lots = [...lots].sort((a,b) => {
        const qa = (a._grp && a._grp.qty_stock) || (a.parentProd && a.parentProd.qty_stock) || 0;
        const qb = (b._grp && b._grp.qty_stock) || (b.parentProd && b.parentProd.qty_stock) || 0;
        if(qb !== qa) return qb - qa;
        return parseInt(b.prodId) - parseInt(a.prodId);
      });
    }

    return lots;
  }

  /* === Lot card === */
  function renderLotCard(lot){
    const grp = lot._grp || {};
    const prod = lot.parentProd || L.findProduct(lot.prodId);
    const inCart = L.cart.hasLot(lot.barcode);
    const onSale = lot.is_akciya;
    const reserved = lot.reserved;
    const free = !reserved && !onSale;

    /* Prefer concrete lot video thumb; fall back to product photo for playlist URLs. */
    const thumb = L.youtubeThumb(lot.youtube) || L.youtubeThumb(grp.youtube)
                  || (prod && (prod.thumb || prod.image));
    const watchUrl = L.youtubeWatchUrl(lot.youtube || grp.youtube);

    const isList = state.layout === 'list';
    const cardCls = `lot-card ${isList ? 'list' : ''} ${onSale ? 'on-sale' : ''} ${inCart ? 'in-cart' : ''} ${reserved ? 'reserved' : ''}`;

    const statusBadge = onSale
      ? `<span class="tag tag-status-sale">АКЦІЯ</span>`
      : reserved ? `<span class="tag tag-status-reserved">Заброньований</span>`
      : `<span class="tag tag-status-free">Вільний</span>`;

    const priceUah = lot.price_uah != null ? L.formatUah(lot.price_uah) : '—';
    const ppk = lot.price_per_kg != null ? `€${Number(lot.price_per_kg).toFixed(2)}/${lot.unit||'кг'}` : '';
    const oldPrice = lot.is_akciya && lot.price_regular_uah != null
      ? `<span class="line-through" style="margin-left:.5rem;color:var(--gray-400);font-weight:400;font-size:.75rem">${L.formatUah(lot.price_regular_uah)}</span>` : '';

    const weight = Number(lot.weight || 0).toFixed(1).replace(/\.0$/, '');

    const desc = L.cleanLotDesc(lot.desc);

    return `<article class="${cardCls}" data-barcode="${L.escapeHtml(lot.barcode)}">
      <a class="lot-card__media" href="${watchUrl}" target="_blank" rel="noopener" data-video="${watchUrl}" data-video-title="Лот ${L.escapeHtml(lot.barcode)} — ${L.escapeHtml(grp.name || lot.prodName)}" aria-label="Відеоогляд лота ${L.escapeHtml(lot.barcode)}">
        ${thumb
          ? `<img class="lot-card__thumb" src="${thumb}" alt="" loading="lazy">`
          : `<div class="lot-card__media-empty"><span class="icon icon-lg" data-icon="video"></span><span class="text-xs">Відео скоро</span></div>`}
        <div class="lot-card__play"><span class="icon icon-lg" data-icon="play"></span></div>
        <div class="lot-card__badges">
          ${statusBadge}
          ${grp.audience && grp.audience !== 'Мікс' ? `<span class="badge-pill" style="background:rgba(255,255,255,.95);font-size:.625rem">${L.escapeHtml(grp.audience)}</span>` : ''}
        </div>
      </a>
      <div class="lot-card__body">
        <p class="lot-card__code">${L.escapeHtml(lot.barcode)}</p>
        <a href="${L.productHref(lot.prodId)}" class="lot-card__title">${L.escapeHtml(grp.name || lot.prodName)}</a>
        <div class="lot-card__stats">
          <span><strong>${weight}</strong> ${lot.unit||'кг'}</span>
          ${lot.qty ? `<span><strong>${lot.qty}</strong> шт</span>` : ''}
          ${grp.sort ? `<span class="badge-pill" style="font-size:.6875rem">${L.escapeHtml(grp.sort)}</span>` : ''}
        </div>
        <div class="lot-card__price-block">
          <p class="lot-card__price">${priceUah}${oldPrice}</p>
          ${ppk ? `<p class="lot-card__price-eur">${ppk}${grp.season ? ' · ' + L.escapeHtml(grp.season) : ''}</p>` : ''}
        </div>
        ${isList && desc ? `<details style="margin-top:.5rem"><summary class="text-xs" style="color:var(--primary);cursor:pointer">Опис лоту</summary><pre style="white-space:pre-wrap;font-family:inherit;font-size:.75rem;color:var(--gray-600);margin-top:.25rem">${L.escapeHtml(desc)}</pre></details>` : ''}
        <div class="lot-card__actions">
          ${reserved
            ? `<button class="btn btn-outline" type="button" disabled style="flex:1;opacity:.7">Заброньований</button>`
            : `<button class="btn ${inCart?'btn-outline-primary':'btn-primary'}" type="button" data-cart="${L.escapeHtml(lot.barcode)}" data-prodid="${L.escapeHtml(lot.prodId)}" style="flex:1">
                <span class="icon icon-sm">${inCart ? ICONS.check() : ICONS.cart()}</span>
                ${inCart ? 'У кошику' : 'В кошик'}
              </button>`}
          <button class="btn btn-outline" type="button" data-order="${L.escapeHtml(lot.barcode)}" title="Запит / замовлення" aria-label="Запит">
            <span class="icon icon-sm" data-icon="messageCircle"></span>
          </button>
        </div>
        ${reserved ? '' : `<button class="btn btn-quick lot-card__quick" type="button" data-quick="${L.escapeHtml(lot.barcode)}">⚡ Замовити в один клік</button>`}
      </div>
    </article>`;
  }

  /* === Filters === */
  const FACETS = [
    { key:'quality',  title:'Якість',  src: () => ['Екстра','Крем','1й сорт','2й сорт','Сток','Мікс'] },
    { key:'season',   title:'Сезон',   src: () => ['Зима','Літо','Демісезон','Всесезонне'] },
    { key:'audience', title:'Стать',   src: () => ['Жіноче','Чоловіче','Дитяче','Дорослі','Мікс'] },
    { key:'country',  title:'Країна',  src: () => ['Англія','Німеччина','Канада','Польща','Італія','Шотландія'] },
  ];
  const STATUS_OPTS = [
    { v:'free', label:'Вільні' },
    { v:'sale', label:'Акційні' },
    { v:'reserved', label:'Заброньовані' },
  ];

  function buildFiltersHTML(){
    const parts = [];
    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Пошук</div>
      <input type="search" id="fSearch" class="filter-select" placeholder="Назва, бренд, штрихкод…" value="${L.escapeHtml(state.q)}">
    </div>`);

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Статус</div>
      <div class="filter-options">
        ${STATUS_OPTS.map(o => `
          <label class="filter-option">
            <input type="checkbox" data-facet="status" value="${o.v}" ${state.status.includes(o.v) ? 'checked' : ''}>
            <span>${o.label}</span>
          </label>
        `).join('')}
      </div>
    </div>`);

    /* Skip cat picker when filtered by single product */
    if(!state.productId && !state.cat){
      const counts = lotsCountByTopCat();
      parts.push(`<div class="filter-block">
        <div class="filter-block__title">Категорія</div>
        <div class="filter-options">
          ${L.TOP_CATS.filter(c => counts.get(c)).map(c => `
            <label class="filter-option">
              <input type="radio" name="fCat" value="${L.escapeHtml(c)}" ${state.cat===c?'checked':''} style="appearance:auto;width:auto;height:auto;border:none">
              <span>${L.escapeHtml(c)}</span>
              <span class="filter-option__count">${counts.get(c) || 0}</span>
            </label>
          `).join('')}
        </div>
      </div>`);
    }

    if(!state.productId){
      for(const f of FACETS){
        const opts = f.src();
        parts.push(`<div class="filter-block">
          <div class="filter-block__title">${f.title}</div>
          <div class="filter-options">
            ${opts.map(o => `
              <label class="filter-option">
                <input type="checkbox" data-facet="${f.key}" value="${L.escapeHtml(o)}" ${(state[f.key]||[]).includes(o) ? 'checked' : ''}>
                <span>${L.escapeHtml(o)}</span>
              </label>
            `).join('')}
          </div>
        </div>`);
      }
    }

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Ціна за лот, ₴</div>
      <div class="filter-range">
        <input type="number" id="fPriceMin" placeholder="від" min="0" step="100" value="${state.priceMin||''}">
        <span>—</span>
        <input type="number" id="fPriceMax" placeholder="до" min="0" step="100" value="${state.priceMax||''}">
      </div>
    </div>`);

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Вага лоту, кг</div>
      <div class="filter-range">
        <input type="number" id="fWeightMin" placeholder="від" min="0" step="1" value="${state.weightMin||''}">
        <span>—</span>
        <input type="number" id="fWeightMax" placeholder="до" min="0" step="1" value="${state.weightMax||''}">
      </div>
    </div>`);

    parts.push(`<div class="filter-block">
      <button class="btn btn-outline w-full" id="fReset" type="button">Скинути всі фільтри</button>
    </div>`);
    return parts.join('');
  }

  function lotsCountByTopCat(){
    const map = new Map();
    for(const l of L.getAllLots()){
      const pp = l.parentProd || L.findProduct(l.prodId);
      if(!pp || !pp.topCat) continue;
      map.set(pp.topCat, (map.get(pp.topCat)||0)+1);
    }
    return map;
  }

  function bindFilters(root){
    root.querySelector('#fSearch')?.addEventListener('input', L.debounce(e => {
      state.q = e.target.value.trim(); state.page = 1; pushUrl(); render();
    }, 250));

    root.querySelectorAll('input[name=fCat]').forEach(r => {
      r.addEventListener('change', () => {
        state.cat = r.value || null; state.sub = null; state.page = 1; pushUrl(); render();
      });
    });

    root.querySelectorAll('input[type=checkbox][data-facet]').forEach(cb => {
      cb.addEventListener('change', () => {
        const f = cb.dataset.facet, v = cb.value;
        const arr = state[f] || [];
        if(cb.checked){ if(!arr.includes(v)) arr.push(v); }
        else state[f] = arr.filter(x => x !== v);
        state[f] = state[f] || arr;
        state.page = 1; pushUrl(); render();
      });
    });

    const pmin = root.querySelector('#fPriceMin'), pmax = root.querySelector('#fPriceMax');
    [pmin, pmax].forEach(el => el?.addEventListener('change', () => {
      state.priceMin = pmin?.value ? parseFloat(pmin.value) : null;
      state.priceMax = pmax?.value ? parseFloat(pmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));
    const wmin = root.querySelector('#fWeightMin'), wmax = root.querySelector('#fWeightMax');
    [wmin, wmax].forEach(el => el?.addEventListener('change', () => {
      state.weightMin = wmin?.value ? parseFloat(wmin.value) : null;
      state.weightMax = wmax?.value ? parseFloat(wmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));

    root.querySelector('#fReset')?.addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[], status:[],
        priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', page:1
      });
      pushUrl(); render();
    });
  }

  function renderProductBanner(){
    const banner = document.getElementById('productBanner');
    if(!state.productId){ banner.style.display = 'none'; return; }
    const p = L.findProduct(state.productId);
    const grp = window.LOTS_DATA && window.LOTS_DATA[String(state.productId)];
    if(!p && !grp){ banner.style.display = 'none'; return; }
    const name = (p && p.name) || (grp && grp.name) || 'Товар';
    const img = p && (p.thumb || p.image);
    const allLots = grp ? (grp.lots || []) : [];
    const free = allLots.filter(l => !l.reserved && !l.is_akciya).length;
    const sale = allLots.filter(l => l.is_akciya).length;
    const reserved = allLots.filter(l => l.reserved).length;
    const totalKg = allLots.reduce((s,l) => s + (Number(l.weight)||0), 0);

    const ppkUah = p && p.priceUah ? `${L.formatUah(p.priceUah)}/${p.unit||'кг'}` : '';
    const ppkEur = p && p.priceEur ? `€${p.priceEur.toFixed(2)}/${p.unit||'кг'}` : '';

    banner.innerHTML = `
      <div class="lots-banner">
        ${img ? `
          <a href="${L.productHref(state.productId)}" class="lots-banner__img">
            <img src="${img}" alt="${L.escapeHtml(name)}" loading="lazy">
          </a>` : `<div class="lots-banner__img"></div>`}
        <div class="lots-banner__info">
          <div class="text-xs text-muted">Лоти за товаром № ${L.escapeHtml(String(state.productId).padStart(4,'0'))}</div>
          <a href="${L.productHref(state.productId)}" class="lots-banner__title">${L.escapeHtml(name)}</a>
          <div class="lots-banner__meta">
            ${ppkUah ? `<span class="badge-pill" style="background:var(--red-50);color:var(--red-700);border-color:var(--red-200);font-weight:700">${ppkUah}</span>` : ''}
            ${ppkEur ? `<span class="badge-pill">${ppkEur}</span>` : ''}
            ${free ? `<span class="badge-pill" style="background:var(--green-50);color:var(--green-700);border-color:var(--green-200)">✓ ${free} ${free === 1 ? 'вільний' : (free<5?'вільні':'вільних')}</span>` : ''}
            ${sale ? `<span class="badge-pill" style="background:var(--red-50);color:var(--red-700);border-color:var(--red-200)">🔥 ${sale} акційних</span>` : ''}
            ${reserved ? `<span class="badge-pill" style="background:var(--gray-100);color:var(--gray-600)">${reserved} заброньовано</span>` : ''}
            ${totalKg > 0 ? `<span class="badge-pill">∑ ${totalKg.toFixed(0)} кг</span>` : ''}
          </div>
        </div>
        <div class="lots-banner__actions">
          <a class="btn btn-outline-primary btn-sm" href="${L.productHref(state.productId)}">↩ До товару</a>
          <a class="btn btn-ghost btn-sm" href="lots.html">Усі лоти</a>
        </div>
      </div>`;
    banner.style.display = 'block';
  }

  function renderPills(){
    const el = document.getElementById('pills');
    /* Hide pills when filtered to a single product (banner replaces them) */
    if(state.productId){ el.innerHTML = ''; return; }
    if(!state.cat){
      const counts = lotsCountByTopCat();
      el.innerHTML = L.TOP_CATS.filter(c => counts.get(c)).map(c => {
        return `<a class="chip" href="lots.html?cat=${encodeURIComponent(c)}">${L.escapeHtml(c)} <span class="text-muted">${counts.get(c)}</span></a>`;
      }).join('');
      return;
    }
    /* Sub-categories within the selected top category */
    const subs = new Map();
    for(const lot of L.getAllLots()){
      const pp = lot.parentProd || L.findProduct(lot.prodId);
      if(!pp || pp.topCat !== state.cat) continue;
      const grp = lot._grp || {};
      const sub = grp.subcategory || pp.subcat;
      if(!sub) continue;
      subs.set(sub, (subs.get(sub)||0)+1);
    }
    const sortedSubs = [...subs.entries()].sort((a,b) => b[1]-a[1]);
    el.innerHTML = `<a class="chip ${!state.sub?'active':''}" href="lots.html?cat=${encodeURIComponent(state.cat)}">Усі</a>` +
      sortedSubs.map(([sub,cnt]) => {
        const url = `lots.html?cat=${encodeURIComponent(state.cat)}&sub=${encodeURIComponent(sub)}`;
        return `<a class="chip ${state.sub===sub?'active':''}" href="${url}">${L.escapeHtml(sub)} <span class="text-muted">${cnt}</span></a>`;
      }).join('');
  }

  function renderActive(){
    const af = document.getElementById('activeFilters');
    const chips = [];
    state.quality.forEach(v => chips.push({l:`Якість: ${v}`, k:'quality', v}));
    state.season.forEach(v => chips.push({l:`Сезон: ${v}`, k:'season', v}));
    state.audience.forEach(v => chips.push({l:`Стать: ${v}`, k:'audience', v}));
    state.country.forEach(v => chips.push({l:`Країна: ${v}`, k:'country', v}));
    state.status.forEach(v => chips.push({l:`Статус: ${STATUS_OPTS.find(o=>o.v===v)?.label}`, k:'status', v}));
    if(state.priceMin != null) chips.push({l:`від ${state.priceMin} ₴`, k:'priceMin'});
    if(state.priceMax != null) chips.push({l:`до ${state.priceMax} ₴`, k:'priceMax'});
    if(state.weightMin != null) chips.push({l:`вага ≥${state.weightMin}кг`, k:'weightMin'});
    if(state.weightMax != null) chips.push({l:`вага ≤${state.weightMax}кг`, k:'weightMax'});
    if(state.q) chips.push({l:`«${state.q}»`, k:'q'});
    if(!chips.length){ af.style.display='none'; return; }
    af.style.display = 'flex';
    af.innerHTML = chips.map((c,i) => `<span class="active-filter">${L.escapeHtml(c.l)} <button data-chip="${i}" type="button" aria-label="Прибрати">✕</button></span>`).join('');
    af.querySelectorAll('[data-chip]').forEach(btn => {
      btn.addEventListener('click', () => {
        const c = chips[parseInt(btn.dataset.chip)];
        if(['quality','season','audience','country','status'].includes(c.k)) state[c.k] = state[c.k].filter(x => x !== c.v);
        else if(c.k === 'priceMin') state.priceMin = null;
        else if(c.k === 'priceMax') state.priceMax = null;
        else if(c.k === 'weightMin') state.weightMin = null;
        else if(c.k === 'weightMax') state.weightMax = null;
        else if(c.k === 'q') state.q = '';
        state.page = 1; pushUrl(); render();
      });
    });
  }

  function activeCount(){
    return state.quality.length + state.season.length + state.audience.length + state.country.length + state.status.length
      + (state.priceMin!=null?1:0) + (state.priceMax!=null?1:0)
      + (state.weightMin!=null?1:0) + (state.weightMax!=null?1:0) + (state.q?1:0);
  }

  function renderPagination(total){
    const el = document.getElementById('pagination');
    const pages = Math.ceil(total / L.CONFIG.PER_PAGE);
    if(pages <= 1){ el.style.display='none'; return; }
    el.style.display = 'flex';
    const cur = state.page;
    const items = [];
    items.push(`<a class="${cur===1?'disabled':''}" data-page="${Math.max(1,cur-1)}" aria-label="Попередня">${ICONS.chevronLeft({size:16})}</a>`);
    for(let n = 1; n <= pages; n++){
      if(n === 1 || n === pages || Math.abs(n - cur) <= 2){
        items.push(`<a class="${n===cur?'current':''}" data-page="${n}">${n}</a>`);
      } else if(n === 2 && cur > 4){
        items.push(`<span class="gap">…</span>`);
      } else if(n === pages - 1 && cur < pages - 3){
        items.push(`<span class="gap">…</span>`);
      }
    }
    items.push(`<a class="${cur===pages?'disabled':''}" data-page="${Math.min(pages,cur+1)}" aria-label="Наступна">${ICONS.chevronRight({size:16})}</a>`);
    el.innerHTML = items.join('');
    el.querySelectorAll('[data-page]').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      state.page = parseInt(a.dataset.page);
      pushUrl(); render(); window.scrollTo({top:0, behavior:'smooth'});
    }));
  }

  function plural(n){
    const ten = n % 100;
    if(ten >= 11 && ten <= 14) return 'лотів';
    const o = n % 10;
    if(o === 1) return 'лот';
    if(o >= 2 && o <= 4) return 'лоти';
    return 'лотів';
  }

  function buildOrderText(lot){
    const grp = lot._grp || {};
    const lines = [];
    lines.push(`Лот № ${lot.barcode}`);
    lines.push(`${grp.name || lot.prodName}`);
    lines.push(`Артикул товару: ${String(lot.prodId).padStart(4,'0')}`);
    lines.push(`Вага: ${lot.weight} ${lot.unit||'кг'}`);
    if(lot.qty) lines.push(`К-сть: ${lot.qty} шт`);
    if(lot.price_uah) lines.push(`Ціна: ${L.formatUah(lot.price_uah)} (€${(lot.price_uah/lot.eur_rate).toFixed(2)})`);
    if(grp.sort) lines.push(`Сорт: ${grp.sort}`);
    if(grp.season) lines.push(`Сезон: ${grp.season}`);
    if(lot.youtube) lines.push(`Відео: ${lot.youtube}`);
    return lines.join('\n');
  }

  function render(){
    const filtered = applyFilters();
    const total = filtered.length;

    document.getElementById('totalCount').textContent = `${total} ${plural(total)}`;
    let seoTitle, seoDesc, seoImage, seoCrumbs;
    if(state.productId){
      const p = L.findProduct(state.productId);
      const heading = p ? `Лоти: ${p.name}` : 'Лоти товару';
      document.getElementById('pageTitle').textContent = heading;
      seoTitle = (p ? p.name + ' · Лоти' : 'Лоти товару') + ' — L-TEX';
      seoDesc = `${total} ${plural(total)} зі штрихкодом, реальною вагою та ціною в гривнях. ${p ? p.name : ''}`.slice(0, 200);
      seoImage = p && (p.thumb || p.image);
      seoCrumbs = [
        { name: 'Головна', url: '/' },
        { name: 'Лоти', url: '/lots.html' },
        { name: p ? p.name : 'Товар', url: '/lots.html?id=' + encodeURIComponent(state.productId) },
      ];
    } else {
      document.getElementById('pageTitle').textContent = 'Наявні лоти';
      seoTitle = `Наявні лоти — ${total} мішків зі складу — L-TEX`;
      seoDesc = `Конкретні лоти секонд-хенду зі штрихкодом, реальною вагою та ціною в гривнях. Відеоогляд кожного мішка. Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг.`;
      seoCrumbs = [{ name: 'Головна', url: '/' }, { name: 'Наявні лоти', url: '/lots.html' }];
    }
    L.SEO.setMeta({ title: seoTitle, description: seoDesc, image: seoImage, type: 'website' });
    L.SEO.setBreadcrumbs(seoCrumbs);

    /* breadcrumbs */
    const ol = document.getElementById('bcList');
    if(state.productId){
      const p = L.findProduct(state.productId);
      ol.innerHTML = `<li><a href="index.html">Головна</a></li>
        <li><a href="lots.html">Лоти</a></li>
        <li>${L.escapeHtml(p ? p.name : 'Товар')}</li>`;
    } else if(state.cat){
      ol.innerHTML = `<li><a href="index.html">Головна</a></li>
        <li><a href="lots.html">Лоти</a></li>
        <li>${L.escapeHtml(state.cat)}</li>${state.sub ? `<li>${L.escapeHtml(state.sub)}</li>` : ''}`;
    } else {
      ol.innerHTML = `<li><a href="index.html">Головна</a></li><li>Наявні лоти</li>`;
    }

    renderProductBanner();
    renderPills();
    renderActive();

    const fb = document.getElementById('filterBadge');
    const cnt = activeCount();
    if(cnt){ fb.textContent = cnt; fb.style.display='inline-flex'; } else fb.style.display='none';

    const grid = document.getElementById('grid');
    grid.className = state.layout === 'list' ? 'lots-list' : 'lots-grid';
    document.getElementById('vGrid').classList.toggle('active', state.layout !== 'list');
    document.getElementById('vList').classList.toggle('active', state.layout === 'list');
    document.getElementById('sortSelect').value = state.sort;

    const start = (state.page - 1) * L.CONFIG.PER_PAGE;
    const slice = filtered.slice(start, start + L.CONFIG.PER_PAGE);
    if(!slice.length){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <h3>Лотів не знайдено</h3>
        <p>${state.productId ? 'Цього товару немає в наявних лотах. Залиште запит — менеджер скаже, коли з\'явиться.' : 'Спробуйте змінити фільтри або скинути їх.'}</p>
        ${state.productId ? `<button class="btn btn-primary" id="emptyOrderBtn" type="button" style="margin-top:1rem">📩 Замовити відеоогляд</button>` : `<a class="btn btn-outline" href="lots.html" style="margin-top:1rem">Усі лоти</a>`}
      </div>`;
      const eo = document.getElementById('emptyOrderBtn');
      if(eo){
        eo.addEventListener('click', () => {
          const p = L.findProduct(state.productId);
          L.openOrderModal({
            title: '🎬 Замовити відеоогляд',
            subject: 'Запит відеоогляду',
            intent: 'video',
            presetText: `Прошу зняти відеоогляд для:\n${p ? p.name : 'товару'} (артикул ${String(state.productId).padStart(4,'0')})`,
          });
        });
      }
    } else {
      grid.innerHTML = slice.map(renderLotCard).join('');
      grid.querySelectorAll('[data-icon]').forEach(el => {
        const n = el.dataset.icon;
        if(ICONS[n]) el.innerHTML = ICONS[n]();
      });
      grid.querySelectorAll('[data-cart]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const bc = btn.dataset.cart;
          const pid = btn.dataset.prodid;
          if(L.cart.hasLot(bc)){ location.href = 'cart.html'; return; }
          const lot = L.lotByBarcode(bc);
          const grp = lot && lot._grp;
          L.cart.addLot(bc, pid, grp ? grp.name : 'Лот');
          btn.classList.remove('btn-primary'); btn.classList.add('btn-outline-primary');
          btn.innerHTML = `<span class="icon icon-sm">${ICONS.check({size:16})}</span> У кошику`;
          btn.closest('.lot-card')?.classList.add('in-cart');
        });
      });
      grid.querySelectorAll('[data-quick]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const lot = L.lotByBarcode(btn.dataset.quick);
          if(!lot) return;
          L.openOrderModal({
            title: '⚡ Замовлення в один клік',
            subject: `Замовлення лоту ${lot.barcode}`,
            intent: 'order',
            presetText: buildOrderText(lot),
          });
        });
      });
      grid.querySelectorAll('[data-order]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const lot = L.lotByBarcode(btn.dataset.order);
          if(!lot) return;
          L.openOrderModal({
            title: '📩 Запит по лоту',
            subject: `Запит по лоту ${lot.barcode}`,
            intent: 'consult',
            presetText: buildOrderText(lot),
          });
        });
      });

      /* If barcode in URL, scroll to that card */
      if(state.barcode){
        const target = grid.querySelector(`[data-barcode="${CSS.escape(state.barcode)}"]`);
        if(target){
          target.scrollIntoView({ behavior:'smooth', block:'center' });
          target.style.boxShadow = '0 0 0 3px var(--primary)';
          setTimeout(() => { target.style.boxShadow = ''; }, 2400);
        }
      }
    }
    renderPagination(total);
  }

  function init(){
    readUrl();
    document.getElementById('vGrid').addEventListener('click', () => { state.layout='grid'; pushUrl(); render(); });
    document.getElementById('vList').addEventListener('click', () => { state.layout='list'; pushUrl(); render(); });
    document.getElementById('sortSelect').addEventListener('change', e => {
      state.sort = e.target.value; state.page = 1; pushUrl(); render();
    });

    const dRoot = document.getElementById('filtersDesktop');
    dRoot.innerHTML = buildFiltersHTML(); bindFilters(dRoot);

    const mRoot = document.getElementById('filtersMobileBody');
    const mob = document.getElementById('filtersMobile');
    document.getElementById('openFilters').addEventListener('click', () => {
      mRoot.innerHTML = buildFiltersHTML(); bindFilters(mRoot);
      mob.classList.add('open'); mob.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    });
    const closeMob = () => { mob.classList.remove('open'); mob.setAttribute('aria-hidden','true'); document.body.style.overflow=''; };
    document.getElementById('closeFilters').addEventListener('click', closeMob);
    mob.addEventListener('click', e => { if(e.target === mob) closeMob(); });
    document.getElementById('applyFiltersMobile').addEventListener('click', closeMob);
    document.getElementById('resetFiltersMobile').addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[], status:[],
        priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', page:1
      });
      pushUrl(); render();
      mRoot.innerHTML = buildFiltersHTML(); bindFilters(mRoot);
    });

    window.addEventListener('popstate', () => { readUrl(); render(); });
    window.addEventListener('ltex:rate-changed', render);
    render();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
