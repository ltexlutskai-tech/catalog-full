<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<title>Наявні лоти — L-TEX</title>
<meta name="description" content="Конкретні лоти секонд-хенду з відеооглядом, вагою та ціною. Гуртом від 10 кг.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design-system.css">
<link rel="stylesheet" href="assets/components.css">
</head>
<body>

<header data-ltex-header data-active="lots"></header>

<main class="container" style="padding-top:1.5rem;padding-bottom:3rem">

  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol>
      <li><a href="index.html">Головна</a></li>
      <li>Наявні лоти</li>
    </ol>
  </nav>

  <div class="catalog-toolbar" style="margin-top:1rem">
    <div>
      <h1 class="h1">Наявні лоти</h1>
      <p class="text-muted text-sm" id="totalCount" style="margin-top:.25rem">Завантаження…</p>
    </div>
    <div class="flex items-center gap-2">
      <button class="filter-trigger lg:hidden" id="openFilters" type="button">
        <span class="icon icon-sm" data-icon="filter"></span>
        Фільтри
        <span class="badge" id="filterBadge" style="display:none">0</span>
      </button>
      <select class="filter-select" id="sortSelect" style="width:auto;min-width:11rem" aria-label="Сортування">
        <option value="newest">Спочатку нові</option>
        <option value="price_asc">Ціна: дешевше</option>
        <option value="price_desc">Ціна: дорожче</option>
        <option value="weight_desc">Більша вага</option>
        <option value="name_asc">Назва А–Я</option>
      </select>
      <div class="layout-toggle" role="tablist" aria-label="Вигляд">
        <button id="vGrid" class="active" type="button" aria-label="Сітка"><span class="icon icon-sm" data-icon="layoutGrid"></span></button>
        <button id="vList" type="button" aria-label="Список"><span class="icon icon-sm" data-icon="list"></span></button>
      </div>
    </div>
  </div>

  <div class="flex flex-wrap gap-2" id="pills" style="margin-top:1rem"></div>

  <div class="active-filters" id="activeFilters" style="margin-top:1rem;display:none"></div>

  <div class="flex flex-col lg:flex-row gap-6" style="margin-top:1.5rem">
    <aside class="filters-aside" aria-label="Фільтри">
      <div class="filters-aside__inner" id="filtersDesktop"></div>
    </aside>

    <div class="min-w-0 flex-1">
      <div id="grid" class="lots-grid" aria-live="polite"></div>
      <div id="pagination" class="pagination" style="display:none"></div>
    </div>
  </div>
</main>

<div class="filters-mobile" id="filtersMobile" role="dialog" aria-label="Фільтри" aria-hidden="true">
  <div class="filters-mobile__panel">
    <div class="filters-mobile__head">
      <h3 class="h3">Фільтри</h3>
      <button class="icon-btn" id="closeFilters" type="button" aria-label="Закрити"><span class="icon" data-icon="x"></span></button>
    </div>
    <div class="filters-mobile__body" id="filtersMobileBody"></div>
    <div class="filters-mobile__foot">
      <button class="btn btn-outline flex-1" id="resetFiltersMobile" type="button">Скинути</button>
      <button class="btn btn-primary flex-1" id="applyFiltersMobile" type="button">Показати</button>
    </div>
  </div>
</div>

<!-- Quick order modal -->
<div class="modal" id="quickOrderModal" role="dialog" aria-label="Швидке замовлення" aria-hidden="true">
  <div class="modal__panel">
    <div class="modal__head">
      <h3 class="h3">⚡ Замовлення в один клік</h3>
      <button class="icon-btn" id="quickClose" type="button" aria-label="Закрити"><span class="icon" data-icon="x"></span></button>
    </div>
    <div class="modal__body" id="quickBody"></div>
  </div>
</div>

<footer data-ltex-footer></footer>

<script src="data/meta.js"></script>
<script src="data/images.js"></script>
<script src="data/details.js"></script>
<script src="data/products.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/utils.js"></script>
<script src="assets/wishlist.js"></script>
<script src="assets/search.js"></script>
<script src="assets/header.js"></script>
<script>
/* ============= Lots page logic =============
   This static project has products (window.PRODUCTS) but no per-bag "lot" records.
   Treat each product as a virtual lot: barcode = product id, weight = product.weight,
   priceEur = product.priceEur, video = product.youtube.
   We only show products that have a YouTube link (proper lots have video).
*/
(() => {
  const L = window.LTEX;
  const ICONS = window.ICONS;

  document.querySelectorAll('[data-icon]').forEach(el => {
    const n = el.dataset.icon;
    if(ICONS[n]) el.innerHTML = ICONS[n]();
  });

  const state = {
    cat: null, sub: null,
    quality: [], season: [], audience: [], country: [],
    status: [],            // ['free','sale']
    inStock: false,
    priceMin:null, priceMax:null,
    weightMin:null, weightMax:null,
    q:'', sort:'newest', layout:'grid', page:1,
  };

  function readUrl(){
    const p = L.getParams();
    state.cat = p.cat || null;
    state.sub = p.sub || null;
    state.quality = (p.quality||'').split(',').filter(Boolean);
    state.season = (p.season||'').split(',').filter(Boolean);
    state.audience = (p.audience||'').split(',').filter(Boolean);
    state.country = (p.country||'').split(',').filter(Boolean);
    state.status = (p.status||'').split(',').filter(Boolean);
    state.inStock = p.inStock === '1';
    state.priceMin = p.priceMin ? parseFloat(p.priceMin) : null;
    state.priceMax = p.priceMax ? parseFloat(p.priceMax) : null;
    state.weightMin = p.weightMin ? parseFloat(p.weightMin) : null;
    state.weightMax = p.weightMax ? parseFloat(p.weightMax) : null;
    state.q = p.q || '';
    state.sort = p.sort || 'newest';
    state.layout = p.layout === 'list' ? 'list' : 'grid';
    state.page = Math.max(1, parseInt(p.page||'1',10) || 1);
  }

  function pushUrl(){
    L.setParams({
      cat: state.cat, sub: state.sub,
      quality: state.quality, season: state.season,
      audience: state.audience, country: state.country,
      status: state.status,
      inStock: state.inStock ? '1' : '',
      priceMin: state.priceMin || '', priceMax: state.priceMax || '',
      weightMin: state.weightMin || '', weightMax: state.weightMax || '',
      q: state.q, sort: state.sort,
      layout: state.layout === 'list' ? 'list' : '',
      page: state.page > 1 ? state.page : '',
    }, true);
  }

  /* === Filter pipeline === */
  function applyFilters(products){
    let list = products.filter(p => p.youtube);   // only items with video are "lots"
    if(state.cat) list = list.filter(p => p.topCat === state.cat);
    if(state.sub) list = list.filter(p => p.subcat === state.sub || p.category === state.sub);
    if(state.quality.length) list = list.filter(p => state.quality.includes(p.sort));
    if(state.season.length) list = list.filter(p => state.season.includes(p.season));
    if(state.audience.length) list = list.filter(p => state.audience.includes(p.audience));
    if(state.country.length) list = list.filter(p => state.country.includes(p.country));
    if(state.inStock) list = list.filter(p => p.inStock);
    if(state.status.length){
      list = list.filter(p => {
        const onSale = L.hasDiscount(p);
        const free = !onSale && p.inStock;
        const s = onSale ? 'sale' : (free ? 'free' : 'reserved');
        return state.status.includes(s);
      });
    }
    if(state.priceMin != null) list = list.filter(p => (p.priceEur || 0) >= state.priceMin);
    if(state.priceMax != null) list = list.filter(p => (p.priceEur || 0) <= state.priceMax);
    if(state.weightMin != null) list = list.filter(p => parseFloat(String(p.weight).replace(',', '.')) >= state.weightMin);
    if(state.weightMax != null) list = list.filter(p => parseFloat(String(p.weight).replace(',', '.')) <= state.weightMax);
    if(state.q){
      const r = L.search(state.q, { products: list, minScore: 0.4 });
      return r.map(x => x.p);
    }
    if(state.sort === 'price_asc') list = [...list].sort((a,b) => (a.priceEur||1e9) - (b.priceEur||1e9));
    else if(state.sort === 'price_desc') list = [...list].sort((a,b) => (b.priceEur||0) - (a.priceEur||0));
    else if(state.sort === 'weight_desc') list = [...list].sort((a,b) => parseFloat(String(b.weight).replace(',', '.')) - parseFloat(String(a.weight).replace(',', '.')));
    else if(state.sort === 'name_asc') list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'uk'));
    else /* newest */ list = [...list].sort((a,b) => parseInt(b.id) - parseInt(a.id));
    return list;
  }

  /* === Lot card === */
  function renderLotCard(p){
    const wished = L.wishlist.has(p.id);
    const inCart = L.cart.has(p.id);
    const onSale = L.hasDiscount(p);
    const free = !onSale && p.inStock;
    const thumb = L.youtubeThumb(p.youtube);
    const isList = state.layout === 'list';
    const cardCls = `lot-card ${isList ? 'list' : ''} ${onSale ? 'on-sale' : ''} ${inCart ? 'in-cart' : ''}`;

    const statusBadge = onSale
      ? `<span class="tag tag-status-sale">Акція${p.discount ? ' −'+p.discount+'%' : ''}</span>`
      : free ? `<span class="tag tag-status-free">Вільний</span>`
      : `<span class="tag tag-status-reserved">Очікує</span>`;

    const priceMain = p.priceUah != null ? L.formatUah(p.priceUah) : '—';
    const priceEur = p.priceEur != null ? L.formatEur(p.priceEur) : '';
    const oldEur = p.oldPriceEur != null ? `<span class="line-through" style="margin-left:.25rem">${L.formatEur(p.oldPriceEur)}</span>` : '';

    const weight = String(p.weight || '').replace(',', '.');
    const watchUrl = L.youtubeWatchUrl(p.youtube);

    return `<article class="${cardCls}" data-id="${p.id}">
      <a class="lot-card__media" href="${watchUrl}" target="_blank" rel="noopener" aria-label="Відеоогляд лота">
        ${thumb
          ? `<img class="lot-card__thumb" src="${thumb}" alt="" loading="lazy">`
          : `<div class="lot-card__media-empty"><span class="icon icon-lg" data-icon="video"></span><span class="text-xs">Плейлист</span></div>`}
        <div class="lot-card__play"><span class="icon icon-lg" data-icon="play"></span></div>
        <div class="lot-card__badges">
          ${statusBadge}
          ${p.audience && p.audience !== 'Мікс' ? `<span class="badge-pill" style="background:rgba(255,255,255,.95);font-size:.625rem">${L.escapeHtml(p.audience)}</span>` : ''}
        </div>
        <button class="lot-card__wish ${wished ? 'active' : ''}" data-wish="${p.id}" type="button" aria-label="${wished ? 'Прибрати з обраного' : 'Додати в обране'}" onclick="event.preventDefault();event.stopPropagation()">
          <span class="icon icon-sm">${wished ? ICONS.heartFilled() : ICONS.heart()}</span>
        </button>
      </a>
      <div class="lot-card__body">
        <p class="lot-card__code">№ ${L.escapeHtml(String(p.id).padStart(4,'0'))}</p>
        <a href="${L.productHref(p.id)}" class="lot-card__title">${L.escapeHtml(p.name)}</a>
        <div class="lot-card__stats">
          <span><strong>${weight || '—'}</strong> ${p.unit === 'шт' ? 'шт' : 'кг'}</span>
          ${p.sort ? `<span class="badge-pill" style="font-size:.6875rem">${L.escapeHtml(p.sort)}</span>` : ''}
          ${p.season ? `<span class="badge-pill" style="font-size:.6875rem">${L.escapeHtml(p.season)}</span>` : ''}
        </div>
        <div class="lot-card__price-block">
          <p class="lot-card__price">${priceMain}<span style="font-size:.75rem;font-weight:400;color:var(--gray-500)">/${p.unit||'кг'}</span></p>
          <p class="lot-card__price-eur">${priceEur} ${oldEur}</p>
        </div>
        <div class="lot-card__actions">
          <a class="btn btn-outline-primary" href="${L.productHref(p.id)}">Детальніше</a>
          <button class="btn btn-primary" data-add-cart="${p.id}" type="button">
            <span class="icon icon-sm">${inCart ? ICONS.check() : ICONS.plus()}</span>
            ${inCart ? 'У кошику' : 'Додати'}
          </button>
        </div>
        ${free || onSale ? `<button class="btn btn-quick lot-card__quick" data-quick="${p.id}" type="button">⚡ Замовити в один клік</button>` : ''}
      </div>
    </article>`;
  }

  /* === Filters === */
  const FACETS = [
    { key:'quality',  title:'Якість',  src: () => ['Екстра','Крем','1й сорт','2й сорт','Сток','Мікс'] },
    { key:'season',   title:'Сезон',   src: () => ['Зима','Літо','Демісезон','Всесезонне'] },
    { key:'audience', title:'Стать',   src: () => ['Жіноче','Чоловіче','Дитяче','Дорослі','Мікс'] },
    { key:'country',  title:'Країна',  src: () => ['Англія','Німеччина','Канада','Польща','Італія','Шотландія'] },
  ];
  const STATUS_OPTS = [
    { v:'free', label:'Вільні' },
    { v:'sale', label:'Акційні' },
    { v:'reserved', label:'Очікують' },
  ];

  function buildFiltersHTML(){
    const parts = [];
    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Пошук</div>
      <input type="search" id="fSearch" class="filter-select" placeholder="Назва, ID, бренд…" value="${L.escapeHtml(state.q)}">
    </div>`);

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Статус</div>
      <div class="filter-options">
        ${STATUS_OPTS.map(o => `
          <label class="filter-option">
            <input type="checkbox" data-facet="status" value="${o.v}" ${state.status.includes(o.v) ? 'checked' : ''}>
            <span>${o.label}</span>
          </label>
        `).join('')}
      </div>
    </div>`);

    if(!state.cat){
      const counts = L.topCatCounts();
      parts.push(`<div class="filter-block">
        <div class="filter-block__title">Категорія</div>
        <div class="filter-options">
          ${L.TOP_CATS.filter(c => counts.get(c)).map(c => `
            <label class="filter-option">
              <input type="radio" name="fCat" value="${L.escapeHtml(c)}" ${state.cat===c?'checked':''} style="appearance:auto;width:auto;height:auto;border:none">
              <span>${L.escapeHtml(c)}</span>
              <span class="filter-option__count">${counts.get(c) || 0}</span>
            </label>
          `).join('')}
        </div>
      </div>`);
    }

    for(const f of FACETS){
      const opts = f.src();
      parts.push(`<div class="filter-block">
        <div class="filter-block__title">${f.title}</div>
        <div class="filter-options">
          ${opts.map(o => `
            <label class="filter-option">
              <input type="checkbox" data-facet="${f.key}" value="${L.escapeHtml(o)}" ${(state[f.key]||[]).includes(o) ? 'checked' : ''}>
              <span>${L.escapeHtml(o)}</span>
            </label>
          `).join('')}
        </div>
      </div>`);
    }

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Ціна, €</div>
      <div class="filter-range">
        <input type="number" id="fPriceMin" placeholder="від" min="0" step="0.1" value="${state.priceMin||''}">
        <span>—</span>
        <input type="number" id="fPriceMax" placeholder="до" min="0" step="0.1" value="${state.priceMax||''}">
      </div>
    </div>`);

    parts.push(`<div class="filter-block">
      <div class="filter-block__title">Вага лоту, кг</div>
      <div class="filter-range">
        <input type="number" id="fWeightMin" placeholder="від" min="0" step="1" value="${state.weightMin||''}">
        <span>—</span>
        <input type="number" id="fWeightMax" placeholder="до" min="0" step="1" value="${state.weightMax||''}">
      </div>
    </div>`);

    parts.push(`<div class="filter-block">
      <label class="filter-option">
        <input type="checkbox" id="fInStock" ${state.inStock?'checked':''}>
        <span>Тільки в наявності</span>
      </label>
    </div>`);

    parts.push(`<div class="filter-block">
      <button class="btn btn-outline w-full" id="fReset" type="button">Скинути всі фільтри</button>
    </div>`);
    return parts.join('');
  }

  function bindFilters(root){
    root.querySelector('#fSearch')?.addEventListener('input', L.debounce(e => {
      state.q = e.target.value.trim(); state.page = 1; pushUrl(); render();
    }, 250));

    root.querySelectorAll('input[name=fCat]').forEach(r => {
      r.addEventListener('change', () => {
        state.cat = r.value || null; state.sub = null; state.page = 1; pushUrl(); render();
      });
    });

    root.querySelectorAll('input[type=checkbox][data-facet]').forEach(cb => {
      cb.addEventListener('change', () => {
        const f = cb.dataset.facet, v = cb.value;
        const arr = state[f] || [];
        if(cb.checked){ if(!arr.includes(v)) arr.push(v); }
        else state[f] = arr.filter(x => x !== v);
        state[f] = state[f] || arr;
        state.page = 1; pushUrl(); render();
      });
    });

    const pmin = root.querySelector('#fPriceMin'), pmax = root.querySelector('#fPriceMax');
    [pmin, pmax].forEach(el => el?.addEventListener('change', () => {
      state.priceMin = pmin?.value ? parseFloat(pmin.value) : null;
      state.priceMax = pmax?.value ? parseFloat(pmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));
    const wmin = root.querySelector('#fWeightMin'), wmax = root.querySelector('#fWeightMax');
    [wmin, wmax].forEach(el => el?.addEventListener('change', () => {
      state.weightMin = wmin?.value ? parseFloat(wmin.value) : null;
      state.weightMax = wmax?.value ? parseFloat(wmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));

    root.querySelector('#fInStock')?.addEventListener('change', e => {
      state.inStock = e.target.checked; state.page = 1; pushUrl(); render();
    });
    root.querySelector('#fReset')?.addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[], status:[],
        inStock:false, priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', page:1
      });
      pushUrl(); render();
    });
  }

  function renderPills(){
    const el = document.getElementById('pills');
    if(!state.cat){
      el.innerHTML = L.TOP_CATS.map(c => {
        const cnt = (L.getProducts().filter(p => p.youtube && p.topCat === c)).length;
        if(!cnt) return '';
        return `<a class="chip" href="lots.html?cat=${encodeURIComponent(c)}">${L.escapeHtml(c)} <span class="text-muted">${cnt}</span></a>`;
      }).join('');
      return;
    }
    const subs = L.subcatsForTop(state.cat);
    el.innerHTML = `<a class="chip ${!state.sub?'active':''}" href="lots.html?cat=${encodeURIComponent(state.cat)}">Усі</a>` +
      subs.map(s => {
        const url = `lots.html?cat=${encodeURIComponent(state.cat)}&sub=${encodeURIComponent(s.name)}`;
        return `<a class="chip ${state.sub===s.name?'active':''}" href="${url}">${L.escapeHtml(s.name)} <span class="text-muted">${s.count}</span></a>`;
      }).join('');
  }

  function renderActive(){
    const af = document.getElementById('activeFilters');
    const chips = [];
    state.quality.forEach(v => chips.push({l:`Якість: ${v}`, k:'quality', v}));
    state.season.forEach(v => chips.push({l:`Сезон: ${v}`, k:'season', v}));
    state.audience.forEach(v => chips.push({l:`Стать: ${v}`, k:'audience', v}));
    state.country.forEach(v => chips.push({l:`Країна: ${v}`, k:'country', v}));
    state.status.forEach(v => chips.push({l:`Статус: ${STATUS_OPTS.find(o=>o.v===v)?.label}`, k:'status', v}));
    if(state.inStock) chips.push({l:'В наявності', k:'inStock'});
    if(state.priceMin != null) chips.push({l:`від €${state.priceMin}`, k:'priceMin'});
    if(state.priceMax != null) chips.push({l:`до €${state.priceMax}`, k:'priceMax'});
    if(state.weightMin != null) chips.push({l:`вага ≥${state.weightMin}кг`, k:'weightMin'});
    if(state.weightMax != null) chips.push({l:`вага ≤${state.weightMax}кг`, k:'weightMax'});
    if(state.q) chips.push({l:`«${state.q}»`, k:'q'});
    if(!chips.length){ af.style.display='none'; return; }
    af.style.display = 'flex';
    af.innerHTML = chips.map((c,i) => `<span class="active-filter">${L.escapeHtml(c.l)} <button data-chip="${i}" type="button" aria-label="Прибрати">✕</button></span>`).join('');
    af.querySelectorAll('[data-chip]').forEach(btn => {
      btn.addEventListener('click', () => {
        const c = chips[parseInt(btn.dataset.chip)];
        if(['quality','season','audience','country','status'].includes(c.k)) state[c.k] = state[c.k].filter(x => x !== c.v);
        else if(c.k === 'inStock') state.inStock = false;
        else if(c.k === 'priceMin') state.priceMin = null;
        else if(c.k === 'priceMax') state.priceMax = null;
        else if(c.k === 'weightMin') state.weightMin = null;
        else if(c.k === 'weightMax') state.weightMax = null;
        else if(c.k === 'q') state.q = '';
        state.page = 1; pushUrl(); render();
      });
    });
  }

  function activeCount(){
    return state.quality.length + state.season.length + state.audience.length + state.country.length + state.status.length
      + (state.inStock?1:0) + (state.priceMin!=null?1:0) + (state.priceMax!=null?1:0)
      + (state.weightMin!=null?1:0) + (state.weightMax!=null?1:0) + (state.q?1:0);
  }

  function renderPagination(total){
    const el = document.getElementById('pagination');
    const pages = Math.ceil(total / L.CONFIG.PER_PAGE);
    if(pages <= 1){ el.style.display='none'; return; }
    el.style.display = 'flex';
    const cur = state.page;
    const items = [];
    items.push(`<a class="${cur===1?'disabled':''}" data-page="${Math.max(1,cur-1)}" aria-label="Попередня">${ICONS.chevronLeft({size:16})}</a>`);
    for(let n = 1; n <= pages; n++){
      if(n === 1 || n === pages || Math.abs(n - cur) <= 2){
        items.push(`<a class="${n===cur?'current':''}" data-page="${n}">${n}</a>`);
      } else if(n === 2 && cur > 4){
        items.push(`<span class="gap">…</span>`);
      } else if(n === pages - 1 && cur < pages - 3){
        items.push(`<span class="gap">…</span>`);
      }
    }
    items.push(`<a class="${cur===pages?'disabled':''}" data-page="${Math.min(pages,cur+1)}" aria-label="Наступна">${ICONS.chevronRight({size:16})}</a>`);
    el.innerHTML = items.join('');
    el.querySelectorAll('[data-page]').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      state.page = parseInt(a.dataset.page);
      pushUrl(); render(); window.scrollTo({top:0, behavior:'smooth'});
    }));
  }

  function plural(n){
    const ten = n % 100;
    if(ten >= 11 && ten <= 14) return 'лотів';
    const o = n % 10;
    if(o === 1) return 'лот';
    if(o >= 2 && o <= 4) return 'лоти';
    return 'лотів';
  }

  /* === Quick order === */
  function showQuick(p){
    const m = document.getElementById('quickOrderModal');
    document.getElementById('quickBody').innerHTML = `
      <p class="text-muted text-sm" style="margin-bottom:1rem">Залиште номер — менеджер передзвонить впродовж 15 хвилин і підтвердить замовлення.</p>
      <div class="key-facts" style="margin-bottom:1rem">
        <ul>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Лот:</span><span class="key-facts__value">${L.escapeHtml(p.name)}</span></li>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Вага:</span><span class="key-facts__value">${L.escapeHtml(String(p.weight||''))} ${p.unit||'кг'}</span></li>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Ціна:</span><span class="key-facts__value">${L.formatUah(p.priceUah||0)} (${L.formatEur(p.priceEur||0)})/${p.unit||'кг'}</span></li>
        </ul>
      </div>
      <form class="form-field" id="quickForm" autocomplete="on" novalidate>
        <div class="form-field"><label>Ваше ім'я</label><input type="text" id="qName" required></div>
        <div class="form-field"><label>Телефон *</label><input type="tel" id="qPhone" required placeholder="+380..."></div>
        <div class="form-field"><label>Коментар (необов'язково)</label><textarea id="qNote" rows="2"></textarea></div>
        <button class="btn btn-primary w-full" type="submit">Надіслати заявку</button>
        <p class="text-muted text-xs text-center" style="margin-top:.75rem">Або просто <a href="${L.CONFIG.TELEGRAM}" target="_blank" style="color:var(--primary);font-weight:600">напишіть в Telegram</a> · <a href="tel:${L.CONFIG.PHONES[0].tel}" style="color:var(--primary);font-weight:600">${L.CONFIG.PHONES[0].display}</a></p>
      </form>
    `;
    m.classList.add('open'); m.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';

    document.getElementById('quickForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('qName').value.trim();
      const phone = document.getElementById('qPhone').value.trim();
      const note = document.getElementById('qNote').value.trim();
      if(!phone){ L.toast('Вкажіть телефон', 'error'); return; }
      const text = `Замовлення лоту ${String(p.id).padStart(4,'0')}\n${p.name}\nВага: ${p.weight} ${p.unit||'кг'}\nЦіна: ${L.formatUah(p.priceUah)}/${p.unit||'кг'}\n\nКлієнт: ${name || '(не вказано)'}\nТелефон: ${phone}\n${note ? 'Коментар: '+note : ''}`;
      const url = `${L.CONFIG.TELEGRAM}?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
      L.toast('Заявку відправлено в Telegram', 'success');
      hideQuick();
    });
  }
  function hideQuick(){
    const m = document.getElementById('quickOrderModal');
    m.classList.remove('open'); m.setAttribute('aria-hidden','true');
    document.body.style.overflow = '';
  }

  function render(){
    const all = L.getProducts();
    const filtered = applyFilters(all);
    const total = filtered.length;

    document.getElementById('totalCount').textContent = `${total} ${plural(total)}`;
    renderPills();
    renderActive();

    const fb = document.getElementById('filterBadge');
    const cnt = activeCount();
    if(cnt){ fb.textContent = cnt; fb.style.display='inline-flex'; } else fb.style.display='none';

    const grid = document.getElementById('grid');
    grid.className = state.layout === 'list' ? 'lots-list' : 'lots-grid';
    document.getElementById('vGrid').classList.toggle('active', state.layout !== 'list');
    document.getElementById('vList').classList.toggle('active', state.layout === 'list');
    document.getElementById('sortSelect').value = state.sort;

    const start = (state.page - 1) * L.CONFIG.PER_PAGE;
    const slice = filtered.slice(start, start + L.CONFIG.PER_PAGE);
    if(!slice.length){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Немає лотів за цими фільтрами</h3><p>Спробуйте змінити пошук або скинути фільтри.</p></div>`;
    } else {
      grid.innerHTML = slice.map(renderLotCard).join('');
      grid.querySelectorAll('[data-icon]').forEach(el => {
        const n = el.dataset.icon;
        if(ICONS[n]) el.innerHTML = ICONS[n]();
      });
      grid.querySelectorAll('[data-wish]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          const id = btn.dataset.wish;
          const p = L.findProduct(id);
          const on = L.wishlist.toggle(id, p?.name);
          btn.classList.toggle('active', on);
          btn.querySelector('.icon').innerHTML = on ? ICONS.heartFilled({size:16}) : ICONS.heart({size:16});
        });
      });
      grid.querySelectorAll('[data-add-cart]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const id = btn.dataset.addCart;
          const p = L.findProduct(id);
          if(L.cart.has(id)){ location.href = 'cart.html'; return; }
          L.cart.add(id, 1, p?.name);
          btn.innerHTML = `<span class="icon icon-sm">${ICONS.check({size:16})}</span> У кошику`;
          btn.closest('.lot-card')?.classList.add('in-cart');
        });
      });
      grid.querySelectorAll('[data-quick]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const p = L.findProduct(btn.dataset.quick);
          if(p) showQuick(p);
        });
      });
    }
    renderPagination(total);
  }

  function init(){
    readUrl();
    document.getElementById('vGrid').addEventListener('click', () => { state.layout='grid'; pushUrl(); render(); });
    document.getElementById('vList').addEventListener('click', () => { state.layout='list'; pushUrl(); render(); });
    document.getElementById('sortSelect').addEventListener('change', e => {
      state.sort = e.target.value; state.page = 1; pushUrl(); render();
    });

    const dRoot = document.getElementById('filtersDesktop');
    dRoot.innerHTML = buildFiltersHTML(); bindFilters(dRoot);

    const mRoot = document.getElementById('filtersMobileBody');
    const mob = document.getElementById('filtersMobile');
    document.getElementById('openFilters').addEventListener('click', () => {
      mRoot.innerHTML = buildFiltersHTML(); bindFilters(mRoot);
      mob.classList.add('open'); mob.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    });
    const closeMob = () => { mob.classList.remove('open'); mob.setAttribute('aria-hidden','true'); document.body.style.overflow=''; };
    document.getElementById('closeFilters').addEventListener('click', closeMob);
    mob.addEventListener('click', e => { if(e.target === mob) closeMob(); });
    document.getElementById('applyFiltersMobile').addEventListener('click', closeMob);
    document.getElementById('resetFiltersMobile').addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[], status:[],
        inStock:false, priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', page:1
      });
      pushUrl(); render();
      mRoot.innerHTML = buildFiltersHTML(); bindFilters(mRoot);
    });

    document.getElementById('quickClose').addEventListener('click', hideQuick);
    document.getElementById('quickOrderModal').addEventListener('click', e => {
      if(e.target.id === 'quickOrderModal') hideQuick();
    });

    window.addEventListener('popstate', () => { readUrl(); render(); });
    render();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
