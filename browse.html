<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Каталог — L-TEX</title>
<script>
/* Backwards-compat redirect: old URLs like browse.html?cat=Одяг → catalog.html?cat=Одяг */
(() => {
  const params = new URLSearchParams(location.search);
  /* preserve existing params verbatim */
  location.replace('catalog.html' + (params.toString() ? '?' + params.toString() : '') + location.hash);
})();
</script>
<noscript><meta http-equiv="refresh" content="0;url=catalog.html"></noscript>
</head>
<body>
<p>Перенаправляємо на <a href="catalog.html">каталог</a>…</p>
</body>
</html>
