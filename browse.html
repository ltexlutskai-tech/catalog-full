<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Каталог — L-TEX</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7c4dff;
  --purple-dark:#5e35b1;
  --purple-light:#ede7f6;
  --text:#1e293b;
  --text-muted:#64748b;
  --border:#e2e8f0;
  --white:#fff;
  --bg:#f8f7ff;
}
body{font-family:'Open Sans',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(124,77,255,.08)}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Montserrat',sans-serif;font-weight:900;font-size:1.5rem;color:var(--purple);text-decoration:none;letter-spacing:-1px}
.logo span{color:var(--text);font-weight:400;font-size:0.9rem;margin-left:8px}
.header-right{display:flex;gap:12px;align-items:center}
.btn-tg{display:inline-flex;align-items:center;gap:6px;background:var(--purple);color:#fff;padding:8px 18px;border-radius:8px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.85rem;transition:background .2s}
.btn-tg:hover{background:var(--purple-dark)}
.phone-link{color:var(--text-muted);text-decoration:none;font-size:0.85rem;font-weight:600}
.phone-link:hover{color:var(--purple)}

/* BREADCRUMB */
.breadcrumb{max-width:1100px;margin:0 auto;padding:16px 20px 0;display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-muted)}
.breadcrumb a{color:var(--purple);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb-sep{color:var(--border)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* PAGE TITLE */
.page-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:var(--text);margin-bottom:6px}
.page-sub{color:var(--text-muted);margin-bottom:28px;font-size:0.95rem}

/* BACK BUTTON */
.btn-back{display:inline-flex;align-items:center;gap:6px;color:var(--purple);font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;margin-bottom:20px;background:none;border:none;padding:0}
.btn-back:hover{text-decoration:underline}

/* CATEGORY GRID — Step 1 */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.cat-card{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:28px 20px 24px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:14px;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:pointer}
.cat-card:hover{border-color:var(--purple);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,77,255,.15)}
.cat-emoji{font-size:2.8rem}
.cat-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.05rem;text-align:center}
.cat-count{color:var(--text-muted);font-size:0.8rem}

/* SUBCAT GRID — Step 2 */
.subcat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.subcat-card{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:18px 16px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:12px;transition:border-color .2s,background .2s;cursor:pointer}
.subcat-card:hover{border-color:var(--purple);background:var(--purple-light)}
.subcat-card .sc-emoji{font-size:1.5rem;flex-shrink:0}
.subcat-card .sc-name{font-family:'Montserrat',sans-serif;font-weight:600;font-size:0.9rem;line-height:1.3}
.subcat-all{background:var(--purple-light);border-color:var(--purple)}
.subcat-all .sc-name{color:var(--purple)}

/* HIDDEN */
.hidden{display:none!important}

@media(max-width:600px){
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .subcat-grid{grid-template-columns:repeat(2,1fr)}
  .header-right .phone-link{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">L-TEX <span>секонд-хенд гуртом</span></a>
    <div class="header-right">
      <a href="tel:+380676710516" class="phone-link">+380 67 671 05 16</a>
      <a href="https://t.me/L_TEX" target="_blank" class="btn-tg">✉️ Написати</a>
    </div>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb">
  <a href="index.html">Головна</a>
  <span class="breadcrumb-sep">›</span>
  <span id="bc-current">Категорії</span>
</div>

<div class="main">

  <!-- STEP 1: Categories -->
  <div id="step1">
    <div class="page-title">Оберіть категорію</div>
    <div class="page-sub">Натисніть на категорію щоб побачити підкатегорії</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- STEP 2: Subcategories -->
  <div id="step2" class="hidden">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <div class="page-title" id="step2-title"></div>
    <div class="page-sub">Оберіть підкатегорію або перегляньте всі товари</div>
    <div class="subcat-grid" id="subcat-grid"></div>
  </div>

</div>

<script>
const SUBCATS = {"Одяг": ["Вітровки та штормовки", "Джинси", "Колготки та легінси", "Комбінезони", "Костюми", "Кофти флісові", "Купальники", "Куртки та пальта", "Майки та топи", "Нижня білизна", "Одяг мікс", "Піджаки та жилети", "Робочий одяг", "Светри та кардигани", "Сорочки та блузи", "Спортивний одяг", "Спідниці та плаття", "Футболки", "Халати та піжами", "Худі та світшоти", "Шкарпетки", "Шорти", "Штани та брюки"], "Аксесуари": ["Біжутерія", "Сумки та рюкзаки", "Шапки та головні убори"], "Взуття": ["Взуття гумове", "Взуття мікс", "Взуття робоче", "Кросівки та кеди", "Тапочки та шльопанці", "Туфлі та босоніжки", "Черевики та чоботи"], "Дім та побут": ["Килими та килимки", "Побутові товари", "Постільна білизна", "Рушники", "Товари для тварин"], "Іграшки": ["М'які іграшки", "Тверді іграшки"], "Bric-a-Brac": ["Bric-a-Brac"], "Косметика": ["Косметика декоративна"]};

const CAT_EMOJI = {
  'Одяг':'👕','Взуття':'👟','Аксесуари':'👜',
  'Дім та побут':'🏠','Іграшки':'🧸',
  'Bric-a-Brac':'🎁','Косметика':'💄'
};

const SUBCAT_EMOJI = {
  'Футболки':'👕','Штани та брюки':'👖','Джинси':'🔵',
  'Куртки та пальта':'🧥','Кофти флісові':'🧶',
  'Худі та світшоти':'👘','Шкарпетки':'🧦',
  'Нижня білизна':'🩲','Купальники':'🩱',
  'Спортивний одяг':'🏃','Робочий одяг':'🦺',
  'Кросівки та кеди':'👟','Черевики та чоботи':'👢',
  'Тапочки та шльопанці':'🩴','Туфлі та босоніжки':'👠',
  'Взуття гумове':'🌧️','Взуття робоче':'🦺','Взуття мікс':'🛍️',
  'Сумки та рюкзаки':'👜','Шапки та головні убори':'🧢',
  'Біжутерія':'💍','Постільна білизна':'🛏️',
  'Рушники':'🏊','Kilими та килимки':'🪟',
  'Іграшки мікс':'🎮',"М'які іграшки":'🧸','Тверді іграшки':'🎯',
  'Bric-a-Brac':'🎁','Косметика декоративна':'💄',
  'Одяг мікс':'🛍️','Вітровки та штормовки':'🌬️',
  'Колготки та легінси':'🩳','Комбінезони':'🧑‍🔧',
  'Костюми':'🤵','Майки та топи':'👙',
  'Піджаки та жилети':'🧣','Светри та кардигани':'🧥',
  'Сорочки та блузи':'👔','Спідниці та плаття':'👗',
  'Халати та піжами':'🛌','Шорти':'🩳',
  'Побутові товари':'🏠','Товари для тварин':'🐾',
  'Килими та килимки':'🏡'
};

function renderCategories() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.keys(SUBCATS).forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    const subs = SUBCATS[cat];
    card.innerHTML = `
      <span class="cat-emoji">${CAT_EMOJI[cat]||'📦'}</span>
      <span class="cat-name">${cat}</span>
      <span class="cat-count">${subs.length} підкатегорій</span>`;
    card.addEventListener('click', () => showSubcats(cat));
    grid.appendChild(card);
  });
}

function showSubcats(cat) {
  const subs = SUBCATS[cat];
  // If only 1 subcat — go directly to catalog
  if (subs.length === 1) {
    location.href = `catalog.html?cat=${encodeURIComponent(cat)}&sub=${encodeURIComponent(subs[0])}`;
    return;
  }
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step2-title').textContent = cat;
  document.getElementById('bc-current').textContent = cat;
  try{history.pushState({cat}, '', `?cat=${encodeURIComponent(cat)}`)}catch(e){}

  const grid = document.getElementById('subcat-grid');
  grid.innerHTML = '';

  // "All" card first
  const allCard = document.createElement('a');
  allCard.className = 'subcat-card subcat-all';
  allCard.href = `catalog.html?cat=${encodeURIComponent(cat)}`;
  allCard.innerHTML = `<span class="sc-emoji">🔍</span><span class="sc-name">Всі «${cat}»</span>`;
  grid.appendChild(allCard);

  subs.forEach(sub => {
    const card = document.createElement('a');
    card.className = 'subcat-card';
    card.href = `catalog.html?cat=${encodeURIComponent(cat)}&sub=${encodeURIComponent(sub)}`;
    card.innerHTML = `<span class="sc-emoji">${SUBCAT_EMOJI[sub]||'📦'}</span><span class="sc-name">${sub}</span>`;
    grid.appendChild(card);
  });
}

function goBack() {
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('bc-current').textContent = 'Категорії';
  try{history.pushState({}, '', 'browse.html')}catch(e){}
}

// Init
renderCategories();

// URL param: ?cat=Одяг → open step 2 directly
const urlCat = new URLSearchParams(location.search).get('cat');
if (urlCat && SUBCATS[urlCat]) {
  showSubcats(urlCat);
}

window.addEventListener('popstate', (e) => {
  if (e.state && e.state.cat) {
    showSubcats(e.state.cat);
  } else {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    document.getElementById('bc-current').textContent = 'Категорії';
  }
});
</script>
</body>
</html>
