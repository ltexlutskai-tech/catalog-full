<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<title>Товар — L-TEX</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design-system.css">
<link rel="stylesheet" href="assets/components.css">
</head>
<body>

<header data-ltex-header data-active="catalog"></header>

<main class="container" style="padding-top:1.5rem;padding-bottom:3rem">
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol id="bcList">
      <li><a href="index.html">Головна</a></li>
      <li><a href="catalog.html">Каталог</a></li>
      <li id="bcLast">Товар</li>
    </ol>
  </nav>

  <div id="content" style="margin-top:1.5rem"></div>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-label="Перегляд фото" aria-hidden="true">
  <button class="lightbox__close" id="lbClose" type="button" aria-label="Закрити"><span class="icon" data-icon="x"></span></button>
  <button class="lightbox__nav prev" id="lbPrev" type="button" aria-label="Попереднє"><span class="icon" data-icon="chevronLeft"></span></button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox__nav next" id="lbNext" type="button" aria-label="Наступне"><span class="icon" data-icon="chevronRight"></span></button>
  <div class="lightbox__counter" id="lbCounter"></div>
</div>

<div class="modal" id="quickModal" role="dialog" aria-label="Швидке замовлення" aria-hidden="true">
  <div class="modal__panel">
    <div class="modal__head">
      <h3 class="h3">⚡ Замовлення в один клік</h3>
      <button class="icon-btn" id="quickClose" type="button" aria-label="Закрити"><span class="icon" data-icon="x"></span></button>
    </div>
    <div class="modal__body" id="quickBody"></div>
  </div>
</div>

<footer data-ltex-footer></footer>

<script src="data/meta.js"></script>
<script src="data/images.js"></script>
<script src="data/details.js"></script>
<script src="data/products.js"></script>
<script src="data/lots.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/utils.js"></script>
<script src="assets/wishlist.js"></script>
<script src="assets/search.js"></script>
<script src="assets/order-modal.js"></script>
<script src="assets/video-modal.js"></script>
<script src="assets/seo.js"></script>
<script src="assets/header.js"></script>
<script>
(() => {
  const L = window.LTEX;
  const ICONS = window.ICONS;
  document.querySelectorAll('[data-icon]').forEach(el => {
    const n = el.dataset.icon;
    if(ICONS[n]) el.innerHTML = ICONS[n]();
  });

  const params = L.getParams();
  const id = params.id || params.slug;
  const p = L.findProduct(id);
  const root = document.getElementById('content');

  if(!p){
    root.innerHTML = `<div class="empty-state"><h3>Товар не знайдено</h3><p>Можливо, його прибрали з каталогу.</p><a class="btn btn-primary" href="catalog.html" style="margin-top:1rem">Повернутись у каталог</a></div>`;
    document.title = 'Товар не знайдено — L-TEX';
    return;
  }

  /* SEO: title, OG, JSON-LD Product + Breadcrumbs */
  const seoDesc = `${p.name}. ${p.priceUah ? L.formatUah(p.priceUah) + '/' + (p.unit||'кг') + '. ' : ''}${p.sort ? 'Сорт: '+p.sort+'. ' : ''}${p.season ? 'Сезон: '+p.season+'. ' : ''}${p.country ? 'Країна: '+p.country+'. ' : ''}Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг — L-TEX.`.trim();
  L.SEO.setMeta({
    title: `${p.name} — L-TEX`,
    description: seoDesc.slice(0, 200),
    image: p.image,
    type: 'product',
    url: L.productHref(p.id),
  });
  L.SEO.setProduct(p);
  const seoCrumbs = [{ name: 'Головна', url: '/' }, { name: 'Каталог', url: '/catalog.html' }];
  if(p.topCat) seoCrumbs.push({ name: p.topCat, url: L.catalogHref({cat:p.topCat}) });
  if(p.subcat && p.subcat !== p.topCat) seoCrumbs.push({ name: p.subcat, url: L.catalogHref({cat:p.topCat, sub:p.subcat}) });
  seoCrumbs.push({ name: p.name, url: L.productHref(p.id) });
  L.SEO.setBreadcrumbs(seoCrumbs);

  const bc = document.getElementById('bcList');
  let bcHtml = `<li><a href="index.html">Головна</a></li><li><a href="catalog.html">Каталог</a></li>`;
  if(p.topCat) bcHtml += `<li><a href="${L.catalogHref({cat:p.topCat})}">${L.escapeHtml(p.topCat)}</a></li>`;
  if(p.subcat && p.subcat !== p.topCat) bcHtml += `<li><a href="${L.catalogHref({cat:p.topCat, sub:p.subcat})}">${L.escapeHtml(p.subcat)}</a></li>`;
  bcHtml += `<li>${L.escapeHtml(p.name)}</li>`;
  bc.innerHTML = bcHtml;

  let galIdx = 0;
  const images = p.images;
  const details = L.parseDetails(p.detailRaw);

  const facts = [];
  const pushFact = (label, value) => { if(value && String(value).trim() && String(value).trim() !== '—') facts.push({label, value: String(value).trim()}); };
  pushFact('Сезон', p.season || details['сезон']);
  pushFact('Сорт', p.sort || details['сорт']);
  pushFact('Стать', p.audience || details['стать']);
  pushFact('Розміри', details['розміри']);
  pushFact('Країна', p.country || details['країна']);
  pushFact('Бренд', p.brand || details['бренд']);
  pushFact('К-сть одиниць', details['кількість_одиниць']);
  pushFact('Вага одиниці', details['вага_одиниці']);
  pushFact('Вага лоту', `${p.weight || details['вага_лота'] || ''} ${p.unit || 'кг'}`.trim());
  pushFact('Категорія', p.subcat || p.category);

  const isAkciya = L.hasDiscount(p);
  const wished = L.wishlist.has(p.id);
  const inCart = L.cart.has(p.id);
  const productLots = L.lotsForProduct(p.id);
  const hasLots = productLots.length > 0;

  const cleanDesc = (() => {
    if(!p.detailRaw) return '';
    let txt = p.detailRaw.replace(p.name + ' , ', '').replace(p.name + ', ', '').replace(p.name, '');
    /* Remove key-value lines that are already in facts table */
    const skip = /^\s*✔?️?\s*(Сезон|Сорт|Стать|Розміри|Країна|Бренд|Кількість одиниць|Вага одиниці|Вага лота|Категорія)\s*[:\t]/i;
    txt = txt.split('\n').filter(l => !skip.test(l)).join('\n').replace(/\n{3,}/g, '\n\n').trim();
    return txt;
  })();

  const html = `
    <div class="grid lg:grid-cols-2 gap-8">

      <div class="min-w-0">
        <div class="lg:sticky" style="top:5rem">
          ${images.length ? `
            <div class="gallery__main" id="galMain" style="cursor:zoom-in">
              <img id="galImg" src="${images[0]}" alt="${L.escapeHtml(p.name)}">
              ${images.length > 1 ? `
                <button class="gallery__nav prev" id="galPrev" type="button" aria-label="Попереднє"><span class="icon" data-icon="chevronLeft"></span></button>
                <button class="gallery__nav next" id="galNext" type="button" aria-label="Наступне"><span class="icon" data-icon="chevronRight"></span></button>
                <div class="gallery__counter"><span id="galCounter">1 / ${images.length}</span></div>
              ` : ''}
            </div>
            ${images.length > 1 ? `
              <div class="gallery__thumbs" id="galThumbs">
                ${images.map((img,i) => `<button class="gallery__thumb ${i===0?'active':''}" data-thumb="${i}" type="button"><img src="${img}" alt="" loading="lazy"></button>`).join('')}
              </div>
            ` : ''}
          ` : `
            <div class="gallery__main">
              <div class="product-card__media-empty">
                <span class="icon icon-lg" data-icon="video"></span>
                <span class="text-sm">Зображення невдовзі</span>
              </div>
            </div>
          `}

          <div class="key-facts" style="margin-top:1rem;background:var(--green-50);border-color:var(--green-200)">
            <div class="flex items-center gap-2" style="margin-bottom:.5rem">
              <span class="icon" style="color:var(--primary)" data-icon="shieldCheck"></span>
              <strong style="color:var(--green-700)">Чому L-TEX</strong>
            </div>
            <ul style="font-size:.8125rem">
              <li><span class="key-facts__check">✔</span><span>Усі фото та відео — оригінальні, з нашого складу</span></li>
              <li><span class="key-facts__check">✔</span><span>Передоплата не потрібна — менеджер передзвонить для підтвердження</span></li>
              <li><span class="key-facts__check">✔</span><span>Доставка по всій Україні: Нова Пошта · власна доставка · самовивіз</span></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="min-w-0" style="display:flex;flex-direction:column;gap:1.25rem">
        <div>
          <h1 class="h1" style="font-size:1.5rem;line-height:1.25" id="pTitle">${L.escapeHtml(p.name)}</h1>
          <p class="text-sm text-muted" style="margin-top:.5rem">
            Артикул: <span class="font-mono">${L.escapeHtml(String(p.id).padStart(4,'0'))}</span>
          </p>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          ${p.sort ? `<span class="badge-pill">${L.escapeHtml(p.sort)}</span>` : ''}
          ${p.season ? `<span class="badge-pill">${L.escapeHtml(p.season)}</span>` : ''}
          ${p.country ? `<span class="badge-pill">${L.COUNTRY_FLAG[p.country]||''} ${L.escapeHtml(p.country)}</span>` : ''}
          ${p.audience ? `<span class="badge-pill">${L.escapeHtml(p.audience)}</span>` : ''}
          ${p.brand ? `<span class="badge-pill">${L.escapeHtml(p.brand)}</span>` : ''}
          ${isAkciya ? `<span class="tag tag-sale">SALE${p.discount?' −'+p.discount+'%':''}</span>` : ''}
        </div>

        <div>
          <div class="price-head">
            <span class="price-head__primary">${L.formatUah(p.priceUah || 0)}</span>
            ${p.oldPriceUah ? `<span class="price-head__old">${L.formatUah(p.oldPriceUah)}</span>` : ''}
            <span class="price-head__secondary">/ ${p.unit || 'кг'}</span>
          </div>
          <p class="text-sm text-gray-500" style="margin-top:.25rem">
            ${L.formatEur(p.priceEur || 0)}/${p.unit || 'кг'} ·
            <span class="text-muted">курс €1 = <span id="rateValBox">${L.getRate()}</span> ₴</span>
          </p>
        </div>

        <div class="stock ${p.inStock ? 'in' : 'out'}">
          <span class="stock__dot"></span>
          <span>${p.inStock ? 'В наявності на складі' : 'Очікуємо надходження'}</span>
        </div>

        <div class="key-facts">
          <ul>
            ${facts.map(f => `<li>
              <span class="key-facts__check">✔</span>
              <span class="key-facts__label">${L.escapeHtml(f.label)}:</span>
              <span class="key-facts__value">${L.escapeHtml(f.value)}</span>
            </li>`).join('')}
          </ul>
        </div>

        ${cleanDesc ? `<div>
          <h3 class="h3" style="margin-bottom:.5rem">Опис</h3>
          <div class="text-sm" style="white-space:pre-line;color:var(--gray-700);line-height:1.65">${L.escapeHtml(cleanDesc)}</div>
        </div>` : ''}

        <div style="border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;background:#fff">
          <div class="flex items-center gap-3 flex-wrap">
            <div style="display:inline-flex;align-items:center;gap:.5rem">
              <button class="btn btn-outline btn-sm" id="qMinus" type="button" aria-label="Зменшити">−</button>
              <input type="number" id="qInput" value="1" min="1" max="99" step="1" style="width:4rem;text-align:center;padding:.5rem;border:1px solid var(--border);border-radius:var(--radius-md);font-weight:600">
              <button class="btn btn-outline btn-sm" id="qPlus" type="button" aria-label="Збільшити">+</button>
              <span class="text-sm text-muted" id="qLabel">${p.unit === 'кг' ? 'лот' : 'шт'}${p.avgWeight > 0 && p.unit === 'кг' ? ` (${(p.avgWeightLabel||'').replace(/\s*кг\s*$/i,'').trim() || p.avgWeight.toFixed(0)} кг)` : ''}</span>
            </div>
            <div class="flex-1" style="min-width:140px">
              <p class="text-sm text-muted">Сума: <span id="qHint" class="text-xs"></span></p>
              <p class="font-bold text-lg" style="color:var(--red-600)" id="qTotal">${L.formatUah((p.priceUah || 0) * (p.unit === 'кг' && p.avgWeight ? p.avgWeight : 1))}</p>
            </div>
          </div>
          <div class="flex gap-2" style="margin-top:1rem">
            <button class="btn btn-primary btn-lg flex-1" id="addCart" type="button">
              <span class="icon icon-sm">${inCart ? ICONS.check() : ICONS.cart()}</span>
              ${inCart ? 'У кошику — переглянути' : 'Додати до замовлення'}
            </button>
            <button class="icon-btn ${wished?'active':''}" id="wishBtn" type="button" aria-label="${wished?'Прибрати з обраного':'Додати в обране'}" style="border:1px solid var(--border);width:3rem;height:3rem;color:${wished?'var(--red-500)':'var(--gray-500)'}">
              <span class="icon">${wished ? ICONS.heartFilled() : ICONS.heart()}</span>
            </button>
          </div>
          <button class="btn btn-quick w-full" id="quickBtn" style="margin-top:.5rem" type="button">⚡ Замовити в один клік</button>
          <p class="text-xs text-muted text-center" style="margin-top:.75rem">Замовлення обробляє менеджер. Передоплата не потрібна.</p>
        </div>

        <!-- Action grid: order request + lots / video request -->
        <div class="grid md:grid-cols-2 gap-2">
          <button class="btn btn-outline-primary" id="btnOrder" type="button">
            <span class="icon icon-sm" data-icon="mail"></span>
            📩 Замовити / Запит
          </button>
          ${p.youtube ? `
            <a class="btn btn-outline" href="${L.youtubeWatchUrl(p.youtube)}" target="_blank" rel="noopener" data-video="${L.youtubeWatchUrl(p.youtube)}" data-video-title="${L.escapeHtml(p.name)}">
              <span class="icon icon-sm" data-icon="play"></span>
              ▶ Відеоогляд
            </a>` : ''}
          ${hasLots ? `
            <a class="btn btn-primary" href="${L.lotsForProductHref(p.id)}" style="grid-column:1/-1">
              <span class="icon icon-sm" data-icon="package"></span>
              📹 Відеоогляди лотів (${productLots.length})
            </a>` : `
            <button class="btn btn-outline" id="btnReqVideo" type="button" style="grid-column:1/-1">
              <span class="icon icon-sm" data-icon="video"></span>
              🎬 Замовити відеоогляд
            </button>`}
        </div>

        ${hasLots ? `
          <div style="display:flex;gap:.75rem;align-items:center;background:var(--green-50);border:1px solid var(--green-200);border-radius:var(--radius-lg);padding:.75rem 1rem">
            <span class="icon" style="color:var(--green-700);flex-shrink:0" data-icon="package"></span>
            <div style="font-size:.875rem;line-height:1.4">
              <strong style="color:var(--green-900)">Є ${productLots.length} ${productLots.length === 1 ? 'лот' : (productLots.length < 5 ? 'лоти' : 'лотів')} на складі</strong><br>
              <span style="color:var(--green-700)">Конкретні мішки з відео, вагою та ціною в грн</span>
            </div>
          </div>` : ''}

        <div class="flex flex-wrap gap-2">
          <a class="btn btn-ghost btn-sm" href="${L.CONFIG.TELEGRAM}" target="_blank" rel="noopener">
            <span class="icon icon-sm" data-icon="send"></span> Telegram
          </a>
          <a class="btn btn-ghost btn-sm" href="viber://chat?number=%2B380676710516">
            <span class="icon icon-sm" data-icon="messageCircle"></span> Viber
          </a>
          <a class="btn btn-ghost btn-sm" href="tel:${L.CONFIG.PHONES[0].tel}">
            <span class="icon icon-sm" data-icon="phone"></span> ${L.CONFIG.PHONES[0].display}
          </a>
          <a class="btn btn-ghost btn-sm" href="mailto:${L.CONFIG.EMAIL}">
            <span class="icon icon-sm" data-icon="mail"></span> Email
          </a>
        </div>

        <div class="grid md:grid-cols-2 gap-3" style="margin-top:.5rem">
          <div class="flex items-start gap-3" style="padding:.75rem;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <span class="icon" style="color:var(--primary);flex-shrink:0" data-icon="truck"></span>
            <div><div class="font-semibold text-sm">Доставка</div><div class="text-xs text-muted">Нова Пошта · власна доставка · самовивіз</div></div>
          </div>
          <div class="flex items-start gap-3" style="padding:.75rem;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <span class="icon" style="color:var(--primary);flex-shrink:0" data-icon="package"></span>
            <div><div class="font-semibold text-sm">Від ${L.CONFIG.MIN_ORDER_KG} кг</div><div class="text-xs text-muted">Мінімальне замовлення</div></div>
          </div>
          <div class="flex items-start gap-3" style="padding:.75rem;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <span class="icon" style="color:var(--primary);flex-shrink:0" data-icon="clock"></span>
            <div><div class="font-semibold text-sm">1–3 дні</div><div class="text-xs text-muted">Швидке відправлення</div></div>
          </div>
          <div class="flex items-start gap-3" style="padding:.75rem;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <span class="icon" style="color:var(--primary);flex-shrink:0" data-icon="scale"></span>
            <div><div class="font-semibold text-sm">Без передоплати</div><div class="text-xs text-muted">при доставці нашим транспортом</div></div>
          </div>
        </div>
      </div>
    </div>

    ${hasLots ? `
      <section style="margin-top:3rem">
        <div class="flex items-center justify-between" style="margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
          <div>
            <h2 class="h2">📦 Наявні лоти на складі</h2>
            <p class="text-sm text-muted">Конкретні мішки з відеооглядом, вагою та ціною в гривнях</p>
          </div>
          <a href="${L.lotsForProductHref(p.id)}" class="btn btn-outline-primary">
            Усі ${productLots.length} →
          </a>
        </div>
        <div class="lots-grid" id="productLots"></div>
      </section>
    ` : ''}

    <section style="margin-top:3rem">
      <div class="flex items-center justify-between" style="margin-bottom:1rem">
        <h2 class="h2">Схожі товари</h2>
        <a href="${L.catalogHref({cat:p.topCat,sub:p.subcat})}" class="text-sm" style="color:var(--primary);font-weight:500">Усі →</a>
      </div>
      <div class="products-grid" id="related"></div>
    </section>
  `;

  root.innerHTML = html;
  root.querySelectorAll('[data-icon]').forEach(el => {
    const n = el.dataset.icon;
    if(ICONS[n]) el.innerHTML = ICONS[n]();
  });

  /* Gallery */
  const galImg = document.getElementById('galImg');
  const galCounter = document.getElementById('galCounter');
  function setGalIdx(i){
    if(!images.length) return;
    galIdx = ((i % images.length) + images.length) % images.length;
    galImg.src = images[galIdx];
    galCounter && (galCounter.textContent = `${galIdx+1} / ${images.length}`);
    document.querySelectorAll('[data-thumb]').forEach((t,n) => t.classList.toggle('active', n === galIdx));
  }
  document.getElementById('galPrev')?.addEventListener('click', e => { e.stopPropagation(); setGalIdx(galIdx - 1); });
  document.getElementById('galNext')?.addEventListener('click', e => { e.stopPropagation(); setGalIdx(galIdx + 1); });
  document.querySelectorAll('[data-thumb]').forEach(b => b.addEventListener('click', () => setGalIdx(parseInt(b.dataset.thumb))));

  /* Lightbox */
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  let lbIdx = 0;
  function openLb(i){
    if(!images.length) return;
    lbIdx = i;
    lbImg.src = images[lbIdx];
    document.getElementById('lbCounter').textContent = `${lbIdx+1} / ${images.length}`;
    lb.classList.add('open'); lb.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  }
  function closeLb(){ lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
  document.getElementById('galMain')?.addEventListener('click', e => {
    if(e.target.closest('button')) return;
    openLb(galIdx);
  });
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbPrev').addEventListener('click', () => {
    lbIdx = (lbIdx - 1 + images.length) % images.length;
    lbImg.src = images[lbIdx];
    document.getElementById('lbCounter').textContent = `${lbIdx+1} / ${images.length}`;
  });
  document.getElementById('lbNext').addEventListener('click', () => {
    lbIdx = (lbIdx + 1) % images.length;
    lbImg.src = images[lbIdx];
    document.getElementById('lbCounter').textContent = `${lbIdx+1} / ${images.length}`;
  });
  lb.addEventListener('click', e => { if(e.target === lb) closeLb(); });
  document.addEventListener('keydown', e => {
    if(!lb.classList.contains('open')) return;
    if(e.key === 'Escape') closeLb();
    if(e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
    if(e.key === 'ArrowRight') document.getElementById('lbNext').click();
  });

  /* Quantity + CTA — for unit='кг' qty means LOTS (× avgWeight), for 'шт' it's pieces. */
  const qIn = document.getElementById('qInput');
  const qTot = document.getElementById('qTotal');
  const qHint = document.getElementById('qHint');
  const isPerKg = p.unit === 'кг';
  const avgW = (p.avgWeight != null && p.avgWeight > 0) ? p.avgWeight : 0;
  const avgWLabel = (p.avgWeightLabel || '').replace(/\s*кг\s*$/i,'').trim();
  function updateTotal(){
    const v = Math.max(1, parseInt(qIn.value) || 1);
    const multiplier = isPerKg ? (avgW || 1) : 1;
    qTot.textContent = L.formatUah((p.priceUah || 0) * multiplier * v);
    if(qHint){
      if(isPerKg && avgW > 0){
        const wText = avgWLabel || avgW.toFixed(0);
        qHint.textContent = `(${v} × ${wText} кг × ${L.formatUah(p.priceUah || 0)}/кг)`;
      } else {
        qHint.textContent = '';
      }
    }
  }
  document.getElementById('qPlus').addEventListener('click', () => { qIn.value = Math.min(99, parseInt(qIn.value)+1); updateTotal(); });
  document.getElementById('qMinus').addEventListener('click', () => { qIn.value = Math.max(1, parseInt(qIn.value)-1); updateTotal(); });
  qIn.addEventListener('input', updateTotal);
  updateTotal();

  document.getElementById('addCart').addEventListener('click', () => {
    if(L.cart.has(p.id)){ location.href = 'cart.html'; return; }
    L.cart.add(p.id, parseInt(qIn.value) || 1, p.name);
    document.getElementById('addCart').innerHTML = `<span class="icon icon-sm">${ICONS.check()}</span> У кошику — переглянути`;
  });

  document.getElementById('wishBtn').addEventListener('click', () => {
    const btn = document.getElementById('wishBtn');
    const on = L.wishlist.toggle(p.id, p.name);
    btn.classList.toggle('active', on);
    btn.querySelector('.icon').innerHTML = on ? ICONS.heartFilled() : ICONS.heart();
    btn.style.color = on ? 'var(--red-500)' : 'var(--gray-500)';
    btn.setAttribute('aria-label', on ? 'Прибрати з обраного' : 'Додати в обране');
  });

  /* Quick order */
  const qm = document.getElementById('quickModal');
  document.getElementById('quickBtn').addEventListener('click', () => {
    document.getElementById('quickBody').innerHTML = `
      <p class="text-muted text-sm" style="margin-bottom:1rem">Залиште номер — менеджер передзвонить впродовж 15 хвилин.</p>
      <div class="key-facts" style="margin-bottom:1rem">
        <ul>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Товар:</span><span class="key-facts__value">${L.escapeHtml(p.name)}</span></li>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Кількість:</span><span class="key-facts__value">${qIn.value} ${p.unit || 'кг'}</span></li>
          <li><span class="key-facts__check">✔</span><span class="key-facts__label">Сума:</span><span class="key-facts__value">${qTot.textContent}</span></li>
        </ul>
      </div>
      <form id="qForm" novalidate>
        <div class="form-field"><label>Ваше ім'я</label><input type="text" id="qfName" autocomplete="name"></div>
        <div class="form-field"><label>Телефон *</label><input type="tel" id="qfPhone" required placeholder="+380..." autocomplete="tel"></div>
        <div class="form-field"><label>Коментар</label><textarea id="qfNote" rows="2"></textarea></div>
        <button class="btn btn-primary w-full" type="submit">Надіслати</button>
        <p class="text-muted text-xs text-center" style="margin-top:.75rem">
          Або: <a href="${L.CONFIG.TELEGRAM}" target="_blank" style="color:var(--primary);font-weight:600">Telegram</a> ·
          <a href="tel:${L.CONFIG.PHONES[0].tel}" style="color:var(--primary);font-weight:600">${L.CONFIG.PHONES[0].display}</a>
        </p>
      </form>
    `;
    qm.classList.add('open'); qm.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';

    document.getElementById('qForm').addEventListener('submit', e => {
      e.preventDefault();
      const phone = document.getElementById('qfPhone').value.trim();
      if(!phone){ L.toast('Вкажіть телефон','error'); return; }
      const name = document.getElementById('qfName').value.trim();
      const note = document.getElementById('qfNote').value.trim();
      const txt = `Замовлення\n${p.name}\nАртикул: ${String(p.id).padStart(4,'0')}\nКількість: ${qIn.value} ${p.unit || 'кг'}\nСума: ${qTot.textContent}\n\nКлієнт: ${name || '(не вказано)'}\nТелефон: ${phone}\n${note ? 'Коментар: '+note : ''}`;
      window.open(`${L.CONFIG.TELEGRAM}?text=${encodeURIComponent(txt)}`, '_blank');
      L.toast('Заявку надіслано в Telegram', 'success');
      qm.classList.remove('open'); qm.setAttribute('aria-hidden','true'); document.body.style.overflow='';
    });
  });
  document.getElementById('quickClose').addEventListener('click', () => {
    qm.classList.remove('open'); qm.setAttribute('aria-hidden','true'); document.body.style.overflow='';
  });
  qm.addEventListener('click', e => { if(e.target === qm){
    qm.classList.remove('open'); qm.setAttribute('aria-hidden','true'); document.body.style.overflow='';
  }});

  /* === Order request modal (uses assets/order-modal.js) === */
  function buildOrderPreset(){
    const lines = [];
    lines.push(`Товар: ${p.name}`);
    lines.push(`Артикул: ${String(p.id).padStart(4,'0')}`);
    if(p.priceUah) lines.push(`Ціна: ${L.formatUah(p.priceUah)}/${p.unit||'кг'}`);
    if(p.weight) lines.push(`Вага лоту: ${p.weight} ${p.unit||'кг'}`);
    if(p.season) lines.push(`Сезон: ${p.season}`);
    if(p.sort) lines.push(`Сорт: ${p.sort}`);
    return lines.join('\n');
  }
  document.getElementById('btnOrder').addEventListener('click', () => {
    L.openOrderModal({
      title: '📩 Замовити / запит',
      subject: `Запит товару: ${p.name}`,
      intent: 'order',
      presetText: buildOrderPreset(),
    });
  });
  const btnReqVideo = document.getElementById('btnReqVideo');
  if(btnReqVideo){
    btnReqVideo.addEventListener('click', () => {
      L.openOrderModal({
        title: '🎬 Замовити відеоогляд',
        subject: `Запит відеоогляду: ${p.name}`,
        intent: 'video',
        presetText: `Прошу зняти відеоогляд для:\n${p.name}\nАртикул: ${String(p.id).padStart(4,'0')}`,
      });
    });
  }

  /* === Reactive price update on rate change (rate is auto-detected, not editable) === */
  function refreshPriceBlocks(){
    /* update visible price elements after rate change */
    const rate = L.getRate();
    const rateBox = document.getElementById('rateValBox');
    if(rateBox) rateBox.textContent = rate;

    /* main price */
    const priceMainEl = document.querySelector('.price-head__primary');
    if(priceMainEl) priceMainEl.textContent = L.formatUah(p.priceUah || 0);
    const priceOldEl = document.querySelector('.price-head__old');
    if(priceOldEl && p.oldPriceUah != null) priceOldEl.textContent = L.formatUah(p.oldPriceUah);

    /* qty total — re-uses updateTotal so the avgWeight multiplier stays consistent */
    if(typeof updateTotal === 'function') updateTotal();

    /* related products grid */
    document.querySelectorAll('#related .product-card').forEach(card => {
      const id = card.dataset.id;
      const r = L.findProduct(id);
      if(!r) return;
      const priceEl = card.querySelector('.product-card__price');
      if(priceEl){
        priceEl.innerHTML = `${L.formatUah(r.priceUah || 0)}<span class="unit">/${r.unit||'кг'}</span>`;
      }
    });
  }
  window.addEventListener('ltex:rate-changed', refreshPriceBlocks);

  /* === Render product lots (mini cards) === */
  if(hasLots){
    const lotsEl = document.getElementById('productLots');
    const slice = productLots.slice(0, 8);
    lotsEl.innerHTML = slice.map(lot => {
      const inCart = L.cart.hasLot(lot.barcode);
      const reserved = lot.reserved;
      const onSale = lot.is_akciya;
      const thumb = L.youtubeThumb(lot.youtube) || L.youtubeThumb(p.youtube) || p.thumb || p.image;
      const watchUrl = L.youtubeWatchUrl(lot.youtube || p.youtube);
      const status = onSale ? `<span class="tag tag-status-sale">АКЦІЯ</span>`
        : reserved ? `<span class="tag tag-status-reserved">Заброньований</span>`
        : `<span class="tag tag-status-free">Вільний</span>`;
      return `<article class="lot-card ${reserved?'reserved':''} ${onSale?'on-sale':''} ${inCart?'in-cart':''}" data-barcode="${L.escapeHtml(lot.barcode)}">
        <a class="lot-card__media" href="${watchUrl}" target="_blank" rel="noopener" data-video="${watchUrl}" data-video-title="Лот ${L.escapeHtml(lot.barcode)} — ${L.escapeHtml(p.name)}">
          ${thumb ? `<img class="lot-card__thumb" src="${thumb}" alt="" loading="lazy">` : `<div class="lot-card__media-empty"><span class="icon icon-lg">${ICONS.video()}</span></div>`}
          <div class="lot-card__play"><span class="icon icon-lg">${ICONS.play()}</span></div>
          <div class="lot-card__badges">${status}</div>
        </a>
        <div class="lot-card__body">
          <p class="lot-card__code">${L.escapeHtml(lot.barcode)}</p>
          <div class="lot-card__stats" style="margin-top:.25rem">
            <span><strong>${Number(lot.weight||0).toFixed(1).replace(/\\.0$/,'')}</strong> ${lot.unit||'кг'}</span>
            ${lot.qty ? `<span><strong>${lot.qty}</strong> шт</span>` : ''}
          </div>
          <div class="lot-card__price-block">
            <p class="lot-card__price">${lot.price_uah ? L.formatUah(lot.price_uah) : '—'}</p>
            ${lot.price_per_kg ? `<p class="lot-card__price-eur">€${Number(lot.price_per_kg).toFixed(2)}/${lot.unit||'кг'}</p>` : ''}
          </div>
          <div class="lot-card__actions">
            ${reserved
              ? `<button class="btn btn-outline" type="button" disabled style="flex:1;opacity:.7">Заброньований</button>`
              : `<button class="btn ${inCart?'btn-outline-primary':'btn-primary'}" type="button" data-lotcart="${L.escapeHtml(lot.barcode)}" style="flex:1">
                  <span class="icon icon-sm">${inCart ? ICONS.check() : ICONS.cart()}</span>
                  ${inCart ? 'У кошику' : 'В кошик'}
                </button>`}
          </div>
        </div>
      </article>`;
    }).join('');
    lotsEl.querySelectorAll('[data-lotcart]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const bc = btn.dataset.lotcart;
        if(L.cart.hasLot(bc)){ location.href = 'cart.html'; return; }
        L.cart.addLot(bc, p.id, p.name);
        btn.classList.remove('btn-primary'); btn.classList.add('btn-outline-primary');
        btn.innerHTML = `<span class="icon icon-sm">${ICONS.check({size:16})}</span> У кошику`;
        btn.closest('.lot-card')?.classList.add('in-cart');
      });
    });
  }

  /* Related */
  const rel = L.getProducts()
    .filter(x => x.id !== p.id && (x.subcat === p.subcat || x.topCat === p.topCat))
    .sort(() => Math.random() - 0.5)
    .slice(0, 8);
  document.getElementById('related').innerHTML = rel.map(r => {
    const isAk = L.hasDiscount(r);
    return `<article class="product-card ${isAk?'akciya':''}" data-id="${r.id}">
      <a href="${L.productHref(r.id)}">
        <div class="product-card__media">
          ${r.image ? `<img class="product-card__img" src="${r.thumb || r.image}" alt="${L.escapeHtml(r.name)}" loading="lazy">` : `<div class="product-card__media-empty"><span class="icon icon-lg">${ICONS.video()}</span></div>`}
          <div class="product-card__badges">
            ${r.isNew ? `<span class="tag tag-new">NEW</span>` : ''}
            ${isAk ? `<span class="tag tag-sale">SALE</span>` : ''}
          </div>
        </div>
      </a>
      <div class="product-card__body">
        <a href="${L.productHref(r.id)}" class="product-card__title">${L.escapeHtml(r.name)}</a>
        <div class="product-card__price-block">
          <div class="product-card__price">${L.formatUah(r.priceUah || 0)}<span class="unit">/${r.unit||'кг'}</span></div>
          <div class="product-card__price-eur">${L.formatEur(r.priceEur || 0)}</div>
        </div>
      </div>
    </article>`;
  }).join('');
})();
</script>
</body>
</html>
