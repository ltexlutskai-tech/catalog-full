<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Картка товару — L-TEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="data/products.js"></script>
<script src="data/images.js"></script>
<script src="data/details.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --grad:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  --purple:#7c4dff;--purple-dark:#5e35b1;--purple-light:#ede7f6;
  --green:#1a7a3c;--green2:#22a050;
  --text:#1e293b;--text-muted:#64748b;
  --border:#e2e8f0;--white:#fff;--bg:#f8f7ff;
  --shadow:0 4px 16px rgba(118,75,162,.1);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Open Sans',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

/* HEADER (same as catalog.html) */
.hd{background:var(--grad);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.hd-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:11px 20px;gap:10px}
.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.35rem;color:#fff;letter-spacing:2px;text-decoration:none}
.hd-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-nav{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);padding:7px 14px;border-radius:18px;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;transition:.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn-nav:hover{background:rgba(255,255,255,.28)}

/* BREADCRUMB */
.breadcrumb{max-width:1200px;margin:0 auto;padding:14px 20px 0;display:flex;align-items:center;gap:6px;font-size:.84rem;color:var(--text-muted);flex-wrap:wrap}
.breadcrumb a{color:var(--purple);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb-sep{color:#cbd5e1}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:18px 20px 60px}

/* PRODUCT LAYOUT */
.prod-wrap{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,1fr);gap:30px;background:#fff;border-radius:18px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
@media(max-width:860px){.prod-wrap{grid-template-columns:1fr;padding:16px;gap:20px}}

/* CAROUSEL */
.car{position:relative;width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#ede7f6,#e8eaf6);overflow:hidden;border-radius:14px;border:1px solid var(--border)}
.car-track{position:absolute;inset:0;display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.car-slide{flex:0 0 100%;height:100%;background:#fff;cursor:zoom-in}
.car-slide img{width:100%;height:100%;object-fit:contain;display:block}
.car-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:1rem;flex-direction:column;gap:6px}
.car-empty .ic{font-size:3rem;opacity:.5}
.car-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);color:#fff;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.4rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.18s;z-index:3;-webkit-appearance:none}
.car-arrow:hover{background:rgba(0,0,0,.78)}
.car-arrow.left{left:10px}.car-arrow.right{right:10px}
.car-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3;pointer-events:none}
.car-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.7);box-shadow:0 0 0 1px rgba(0,0,0,.25);transition:.2s}
.car-dot.act{background:#fff;width:22px;border-radius:4px}
.car-counter{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);color:#fff;font-size:.78rem;padding:4px 10px;border-radius:12px;font-weight:600;z-index:3}
.thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.thumb{flex:0 0 70px;height:70px;border-radius:8px;overflow:hidden;border:2px solid var(--border);cursor:pointer;background:#fff;transition:.18s}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.act{border-color:var(--purple);box-shadow:0 2px 8px rgba(118,75,162,.3)}
.thumb:hover{border-color:var(--purple-dark)}

/* INFO PANEL */
.info{display:flex;flex-direction:column;gap:14px}
.p-id{font-family:'Montserrat',sans-serif;font-size:.78rem;color:var(--text-muted);font-weight:600;letter-spacing:.5px}
.p-id b{color:var(--purple)}
.p-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:clamp(1.3rem,2.6vw,1.8rem);color:var(--text);line-height:1.25}
.p-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.tag{background:rgba(118,75,162,.08);color:var(--purple-dark);font-size:.78rem;padding:4px 11px;border-radius:10px;font-weight:600}
.tag.cat{background:#ede7f6;color:#5e35b1}
.tag.brand{background:#e8eaf6;color:#3f51b5;font-weight:700}
.tag.sort{background:#fff3cd;color:#92400e;font-weight:700}
.tag.season{background:#dcfce7;color:#166534}
.tag.country{background:#fef3c7;color:#b45309}
.tag.audience{background:#fce7f3;color:#9d174d}
.tag.weight{background:#e0f2fe;color:#075985}

.price-box{background:linear-gradient(135deg,#f8f7ff,#ede7f6);border:2px solid var(--purple-light);border-radius:14px;padding:16px 18px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.price-box.akciya{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5}
.pm-big{font-family:'Montserrat',sans-serif;font-weight:900;font-size:2rem;color:var(--purple-dark);line-height:1}
.pa-big{font-family:'Montserrat',sans-serif;font-weight:900;font-size:2rem;color:#dc2626;line-height:1}
.po-big{font-size:1rem;color:#94a3b8;text-decoration:line-through}
.price-unit{font-size:.85rem;color:var(--text-muted);font-weight:600;margin-left:auto}
.akciya-flag{display:inline-block;background:#dc2626;color:#fff;font-size:.75rem;font-weight:800;padding:3px 9px;border-radius:8px;margin-right:6px}

/* ACTION BUTTONS (4 in a row) */
.act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px}
.act-btn{padding:13px 14px;border-radius:11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;border:none;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;text-align:center;min-height:50px;-webkit-appearance:none}
.act-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.act-yt{background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff}
.act-yt.off{background:#cbd5e1;cursor:not-allowed;color:#fff;opacity:.5}
.act-yt.off:hover{transform:none;box-shadow:none}
.act-wl{background:#fff;color:#dc2626;border:2px solid #fca5a5}
.act-wl.added{background:#dc2626;color:#fff;border-color:#dc2626}
.act-order{background:var(--grad);color:#fff}
.act-lots{background:linear-gradient(135deg,#1a7a3c,#22a050);color:#fff}
.act-lots.disabled{background:#cbd5e1;cursor:not-allowed;opacity:.6}
.act-lots.disabled:hover{transform:none;box-shadow:none}

/* DESCRIPTION */
.desc-section{margin-top:30px;background:#fff;border-radius:18px;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.desc-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.15rem;color:var(--purple-dark);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.desc-body{font-size:.95rem;line-height:1.75;color:#334155;white-space:pre-wrap;background:#f8f7ff;border-left:4px solid var(--purple);border-radius:8px;padding:14px 18px}
.desc-empty{color:#94a3b8;font-style:italic;padding:14px}

/* RELATED LOTS HINT */
.lot-hint{margin-top:20px;background:#dcfce7;border:1.5px solid #86efac;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lot-hint-ic{font-size:1.6rem}
.lot-hint-txt{flex:1;min-width:200px}
.lot-hint-title{font-family:'Montserrat',sans-serif;font-weight:800;color:#166534;margin-bottom:2px}
.lot-hint-sub{font-size:.85rem;color:#15803d}

/* IMAGE LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:none;align-items:center;justify-content:center;padding:30px}
.lb-overlay.open{display:flex}
.lb-overlay img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.lb-close{position:absolute;top:18px;right:22px;background:rgba(255,255,255,.15);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:1.4rem;cursor:pointer}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;width:48px;height:48px;border-radius:50%;font-size:1.6rem;cursor:pointer}
.lb-arrow.l{left:18px}.lb-arrow.r{right:18px}

/* ORDER MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:5000;display:none;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.mo-box{background:#fff;border-radius:18px;padding:24px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:94vh;overflow-y:auto}
.mo-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px}
.mo-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.05rem;color:var(--text)}
.mo-x{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#aaa;width:36px;height:36px;border-radius:50%}
.mo-x:hover{background:#f1f5f9;color:var(--text)}
.mo-prod{background:#f8f7ff;border-radius:9px;padding:10px 13px;margin-bottom:16px;border-left:4px solid var(--purple);font-size:.85rem;line-height:1.5}
.mo-prod b{color:var(--purple-dark);display:block;margin-bottom:2px;font-family:'Montserrat',sans-serif}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ch-btn{padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:#f8f7ff;cursor:pointer;text-align:center;transition:.18s;font-family:inherit}
.ch-btn:hover,.ch-btn.act{border-color:var(--purple);background:rgba(118,75,162,.07)}
.ch-icon{font-size:1.6rem;margin-bottom:5px}
.ch-name{font-weight:700;font-size:.85rem}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:.8rem;font-weight:600;color:#475569;margin-bottom:5px}
.fg input,.fg textarea{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:10px;font-size:16px;font-family:'Open Sans',sans-serif;outline:none;background:#fafafa;transition:.15s}
.fg input:focus,.fg textarea:focus{border-color:var(--purple);background:#fff;box-shadow:0 0 0 3px rgba(118,75,162,.1)}
.fg textarea{resize:vertical;min-height:64px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.fg-row{grid-template-columns:1fr}}
.btn-submit{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--grad);color:#fff;border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;margin-top:6px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(118,75,162,.4)}
.btn-tg{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:linear-gradient(135deg,#0088cc,#005fa3);color:#fff;border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;text-decoration:none;margin-top:6px}
.btn-tg:hover{opacity:.9}
.success{text-align:center;padding:20px 0}
.success-ic{font-size:3rem;margin-bottom:10px}
.success-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.1rem;color:var(--green);margin-bottom:6px}
.success-txt{font-size:.85rem;color:var(--text-muted)}

/* NOT FOUND */
.not-found{max-width:600px;margin:60px auto;text-align:center;padding:30px;background:#fff;border-radius:18px;box-shadow:var(--shadow)}
.nf-ic{font-size:4rem;margin-bottom:14px;opacity:.5}
.nf-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:8px}
.nf-sub{color:var(--text-muted);margin-bottom:20px}

/* FOOTER */
footer{background:#1e293b;color:#94a3b8;text-align:center;padding:24px 20px;font-size:.85rem;margin-top:40px}
footer a{color:#94a3b8;text-decoration:none}

@media(max-width:580px){
  .act-grid{grid-template-columns:1fr 1fr}
  .pm-big,.pa-big{font-size:1.6rem}
  .main{padding:14px 12px 40px}
}
</style>
</head>

    <a href="index.html" class="logo">L-TEX</a>

      <a href="lots.html" class="btn-nav">&#128230; Лоти</a>

<footer>
  <p>&copy; 2026 L-TEX &mdash; Секонд-хенд гуртом &middot; <a href="catalog.html">Каталог</a> &middot; <a href="lots.html">Лоти</a></p>

<!-- LIGHTBOX -->

  <button class="lb-close" id="lbClose">&#10005;</button>

      <div id="tgBlock">
        <p style="font-size:.85rem;color:#64748b;margin-bottom:10px">Натисніть кнопку нижче — відкриється чат із менеджером:</p>
        <a id="tgLink" class="btn-tg" href="https://t.me/L_TEX" target="_blank" rel="noopener">&#9992;&#65039; Написати в Telegram</a>

<script>
const PRODUCTS = window.PRODUCTS||[];
const LOTS_IDS = window.LOTS_IDS||new Set();
const IMG_DIR = '2025-2026-named-top5';
const WL_KEY = 'ltex_wishlist_v1';

function getProductImages(id){
  var map = window.IMAGES_BY_ID || {};
  var list = map[id] || map[String(id).padStart(4,'0')] || map[String(id).replace(/^0+/,'')] || [];
  return list.map(function(f){return IMG_DIR+'/'+encodeURIComponent(f);});
}
function getDetail(id){
  var map = window.DETAILS_BY_ID || {};
  return map[id] || map[String(id).padStart(4,'0')] || map[String(id).replace(/^0+/,'')] || '';
}

function findProduct(id){
  if(!id) return null;
  var raw = String(id);
  return PRODUCTS.find(function(p){return p.id===raw;})
      || PRODUCTS.find(function(p){return p.id===raw.padStart(4,'0');})
      || PRODUCTS.find(function(p){return p.id===raw.replace(/^0+/,'');})
      || null;
}

function getWishlist(){try{return JSON.parse(localStorage.getItem(WL_KEY)||'[]');}catch(e){return [];}}
function setWishlist(arr){try{localStorage.setItem(WL_KEY,JSON.stringify(arr));}catch(e){}}
function isInWish(id){return getWishlist().some(function(w){return w.id===id;});}
function toggleWish(p){
  var wl = getWishlist();
  var idx = wl.findIndex(function(w){return w.id===p.id;});
  if(idx>=0) wl.splice(idx,1);
  else wl.push({id:p.id,name:p.name,price:p.price,akciya:p.akciya,unit:p.unit});
  setWishlist(wl);
  return idx<0;
}

function escapeHTML(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function fmtCur(p){
  return p.akciya
    ? '<span class="akciya-flag">&#128293; АКЦІЯ</span><span class="pa-big">'+p.akciya+'</span> <span class="po-big">'+p.price+'</span> <span class="price-unit">EUR/'+p.unit+'</span>'
    : (p.price?'<span class="pm-big">'+p.price+'</span> <span class="price-unit">EUR/'+p.unit+'</span>':'<span style="color:#94a3b8">Ціна за запитом</span>');
}

function buildBreadcrumb(p){
  return '<a href="index.html">Головна</a>'
    +'<span class="breadcrumb-sep">›</span>'
    +'<a href="catalog.html?cat='+encodeURIComponent(p.category)+'">'+escapeHTML(p.category)+'</a>'
    +'<span class="breadcrumb-sep">›</span>'
    +'<a href="catalog.html?cat='+encodeURIComponent(p.category)+'&sub='+encodeURIComponent(p.subcategory)+'">'+escapeHTML(p.subcategory)+'</a>'
    +'<span class="breadcrumb-sep">›</span>'
    +'<span style="color:#475569">ID '+escapeHTML(p.id)+'</span>';
}

function renderTags(p){
  var tags = '';
  if(p.sort) tags += '<span class="tag sort">'+escapeHTML(p.sort)+'</span>';
  if(p.brand) tags += '<span class="tag brand">'+escapeHTML(p.brand)+'</span>';
  if(p.season && p.season!=='Всесезонне') tags += '<span class="tag season">'+escapeHTML(p.season)+'</span>';
  if(p.audience && p.audience!=='Мікс') tags += '<span class="tag audience">'+escapeHTML(p.audience)+'</span>';
  if(p.country) tags += '<span class="tag country">'+escapeHTML(p.country)+'</span>';
  if(p.weight) tags += '<span class="tag weight">⚖ '+escapeHTML(p.weight)+' '+escapeHTML(p.unit||'кг')+'</span>';
  return tags;
}

function buildCarousel(imgs, name){
  if(!imgs.length){
    return '<div class="car"><div class="car-empty"><div class="ic">&#128247;</div><div>Фото скоро з\'являться</div></div></div>';
  }
  var slides = imgs.map(function(u,i){return '<div class="car-slide" data-idx="'+i+'"><img src="'+u+'" alt="'+escapeHTML(name)+'"></div>';}).join('');
  var dots = imgs.map(function(_,i){return '<span class="car-dot'+(i===0?' act':'')+'"></span>';}).join('');
  var arrows = imgs.length>1
    ? '<button class="car-arrow left" data-dir="-1">&#8249;</button><button class="car-arrow right" data-dir="1">&#8250;</button>'
    : '';
  var counter = imgs.length>1 ? '<div class="car-counter"><span class="cc-cur">1</span>/'+imgs.length+'</div>' : '';
  return '<div class="car" data-len="'+imgs.length+'" data-pos="0">'+counter+
    '<div class="car-track" style="width:'+(imgs.length*100)+'%">'+slides+'</div>'+
    arrows+'<div class="car-dots">'+dots+'</div></div>';
}

function buildThumbs(imgs){
  if(imgs.length<2) return '';
  return '<div class="thumbs">'+imgs.map(function(u,i){return '<div class="thumb'+(i===0?' act':'')+'" data-idx="'+i+'"><img src="'+u+'" alt=""></div>';}).join('')+'</div>';
}

function wireCarousel(carEl, thumbsEl, openLightbox){
  var len = +carEl.dataset.len; if(!len) return;
  var track = carEl.querySelector('.car-track');
  var dots  = carEl.querySelectorAll('.car-dot');
  var counter = carEl.querySelector('.cc-cur');
  var thumbs = thumbsEl ? thumbsEl.querySelectorAll('.thumb') : [];
  var slideW = 100/len;
  var pos = 0;
  function set(p){
    pos = (p+len)%len;
    track.style.transform = 'translateX(-'+(pos*slideW)+'%)';
    dots.forEach(function(d,i){d.classList.toggle('act',i===pos);});
    if(counter) counter.textContent = (pos+1);
    thumbs.forEach(function(t,i){t.classList.toggle('act',i===pos);});
  }
  carEl.querySelectorAll('.car-arrow').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();set(pos+(+b.dataset.dir));});
  });
  thumbs.forEach(function(t){t.addEventListener('click',function(){set(+t.dataset.idx);});});
  // Click on slide -> lightbox
  carEl.querySelectorAll('.car-slide').forEach(function(s){
    s.addEventListener('click',function(e){
      if(e.target.closest('.car-arrow')) return;
      if(openLightbox) openLightbox(pos);
    });
  });
  // Swipe
  var sx=0,dx=0;
  carEl.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;dx=0;},{passive:true});
  carEl.addEventListener('touchmove',function(e){dx=e.touches[0].clientX-sx;},{passive:true});
  carEl.addEventListener('touchend',function(){if(Math.abs(dx)>40)set(pos+(dx<0?1:-1));});
  // Keyboard
  document.addEventListener('keydown',function(e){
    if(document.getElementById('lb').classList.contains('open')) return;
    if(e.key==='ArrowLeft') set(pos-1);
    else if(e.key==='ArrowRight') set(pos+1);
  });
}

function renderProduct(p){
  var imgs = getProductImages(p.id);
  var hasVideo = !!p.youtube;
  var hasLots  = LOTS_IDS.has && LOTS_IDS.has(p.id);
  var inWish = isInWish(p.id);
  var description = getDetail(p.id);

  var html =
    '<div class="breadcrumb">'+buildBreadcrumb(p)+'</div>'+
    '<div class="main">'+
      '<div class="prod-wrap">'+
        '<div>'+
          buildCarousel(imgs, p.name)+
          buildThumbs(imgs)+
        '</div>'+
        '<div class="info">'+
          '<div class="p-id">ID товару: <b>'+escapeHTML(p.id)+'</b></div>'+
          '<div class="p-name">'+escapeHTML(p.name)+'</div>'+
          '<div class="p-meta"><span class="tag cat">'+escapeHTML(p.category)+'</span><span class="tag">'+escapeHTML(p.subcategory)+'</span>'+renderTags(p)+'</div>'+
          '<div class="price-box'+(p.akciya?' akciya':'')+'">'+fmtCur(p)+'</div>'+
          '<div class="act-grid">'+
            (hasVideo
              ? '<a class="act-btn act-yt" href="'+escapeHTML(p.youtube)+'" target="_blank" rel="noopener">▶ YouTube огляд</a>'
              : '<button class="act-btn act-yt off" type="button" disabled>▶ Відео скоро</button>')+
            '<button class="act-btn act-wl'+(inWish?' added':'')+'" id="btnWl">'+(inWish?'❤ В обраному':'♡ Обране')+'</button>'+
            '<button class="act-btn act-order" id="btnOrder">📩 Замовити</button>'+
            (hasLots
              ? '<a class="act-btn act-lots" href="lots.html?id='+encodeURIComponent(p.id)+'">📦 Наявні лоти</a>'
              : '<button class="act-btn act-lots disabled" type="button" disabled title="Лоти тимчасово відсутні">📦 Лотів немає</button>')+
          '</div>'+
          (hasLots?'<div class="lot-hint"><div class="lot-hint-ic">📦</div><div class="lot-hint-txt"><div class="lot-hint-title">Є наявні лоти на складі</div><div class="lot-hint-sub">Перейдіть до конкретних мішків з відео, вагою і ціною в грн</div></div></div>':'')+
        '</div>'+
      '</div>'+
      '<div class="desc-section">'+
        '<div class="desc-title">📋 Детальна інформація про товар</div>'+
        (description
          ? '<div class="desc-body">'+escapeHTML(description)+'</div>'
          : '<div class="desc-empty">Детальний опис цієї позиції наразі недоступний. Зв\'яжіться з менеджером для уточнення характеристик.</div>')+
      '</div>'+
    '</div>';

  document.getElementById('root').innerHTML = html;
  document.title = p.name + ' — L-TEX';

  // wire carousel + lightbox
  var carEl = document.querySelector('.car');
  var thumbsEl = document.querySelector('.thumbs');
  if(carEl){
    wireCarousel(carEl, thumbsEl, function(idx){openLightbox(imgs, idx);});
  }
  // wire wishlist
  var btnWl = document.getElementById('btnWl');
  btnWl.addEventListener('click',function(){
    var added = toggleWish(p);
    btnWl.classList.toggle('added', added);
    btnWl.innerHTML = added ? '❤ В обраному' : '♡ Обране';
  });
  // wire order
  document.getElementById('btnOrder').addEventListener('click',function(){openOrder(p);});
}

function renderNotFound(id){
  document.getElementById('root').innerHTML =
    '<div class="not-found">'+
      '<div class="nf-ic">❓</div>'+
      '<div class="nf-title">Товар не знайдено</div>'+
      '<div class="nf-sub">'+(id?'Код «'+escapeHTML(id)+'» відсутній у каталозі.':'Не вказано код товару.')+'</div>'+
      '<a href="catalog.html" class="act-btn act-order" style="display:inline-flex;text-decoration:none;padding:12px 30px">← Повернутись до каталогу</a>'+
    '</div>';
}

/* ───── LIGHTBOX ───── */
var lbImgs = [], lbIdx = 0;
function openLightbox(imgs, idx){
  lbImgs = imgs; lbIdx = idx||0;
  document.getElementById('lbImg').src = lbImgs[lbIdx];
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow='';
}
function lbStep(d){
  if(!lbImgs.length) return;
  lbIdx = (lbIdx+d+lbImgs.length)%lbImgs.length;
  document.getElementById('lbImg').src = lbImgs[lbIdx];
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', function(){lbStep(-1);});
document.getElementById('lbNext').addEventListener('click', function(){lbStep(1);});
document.getElementById('lb').addEventListener('click', function(e){if(e.target.id==='lb') closeLightbox();});
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lb').classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  else if(e.key==='ArrowLeft') lbStep(-1);
  else if(e.key==='ArrowRight') lbStep(1);
});

/* ───── ORDER MODAL ───── */
var moProd = null;
function openOrder(p){
  moProd = p;
  document.getElementById('moProd').innerHTML =
    '<b>'+escapeHTML(p.name)+'</b>'+
    'ID: '+escapeHTML(p.id)+' &middot; '+escapeHTML(p.subcategory)+
    (p.price?' &middot; '+(p.akciya?p.akciya:p.price)+' EUR/'+escapeHTML(p.unit||'кг'):'');
  // Pre-fill telegram link
  var tgMsg = '🛒 Запит на товар L-TEX:\n'
    + 'ID: '+p.id+'\n'
    + 'Назва: '+p.name+'\n'
    + (p.price?'Ціна: '+(p.akciya?p.akciya:p.price)+' EUR/'+(p.unit||'кг'):'')+'\n\n'
    + 'Доброго дня! Хочу замовити цей лот.';
  document.getElementById('tgLink').href = 'https://t.me/L_TEX?text='+encodeURIComponent(tgMsg);
  setChannel('tg');
  document.getElementById('moFormBlock').style.display='';
  document.getElementById('moSuccess').style.display='none';
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOrder(){
  document.getElementById('mo').classList.remove('open');
  document.body.style.overflow='';
}
function setChannel(ch){
  document.getElementById('chTg').classList.toggle('act', ch==='tg');
  document.getElementById('chEm').classList.toggle('act', ch==='em');
  document.getElementById('tgBlock').style.display = ch==='tg' ? '' : 'none';
  document.getElementById('emBlock').style.display = ch==='em' ? '' : 'none';
}
document.getElementById('moClose').addEventListener('click', closeOrder);
document.getElementById('mo').addEventListener('click', function(e){if(e.target.id==='mo') closeOrder();});
document.getElementById('chTg').addEventListener('click', function(){setChannel('tg');});
document.getElementById('chEm').addEventListener('click', function(){setChannel('em');});

document.getElementById('emForm').addEventListener('submit', function(e){
  e.preventDefault();
  if(!moProd) return;
  var payload = {
    _subject: 'L-TEX запит: '+moProd.name+' (ID '+moProd.id+')',
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    city: document.getElementById('fCity').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    comment: document.getElementById('fComment').value.trim(),
    product_id: moProd.id,
    product_name: moProd.name,
    product_price: (moProd.akciya?moProd.akciya:moProd.price)+' EUR/'+(moProd.unit||'кг')
  };
  if(!payload.name||!payload.phone||!payload.city){
    alert('Заповніть, будь ласка: ім\'я, телефон та місто.'); return;
  }
  fetch('https://formsubmit.co/ajax/ltex.lutsk.ai@gmail.com', {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(){
    document.getElementById('moFormBlock').style.display='none';
    document.getElementById('moSuccess').style.display='';
  }).catch(function(){
    alert('Не вдалось надіслати. Спробуйте Telegram або зателефонуйте: +380 67 671 05 16');
  });
});

/* ───── BOOT ───── */
(function init(){
  var id = new URLSearchParams(location.search).get('id');
  var p = findProduct(id);
  if(!p){ renderNotFound(id); return; }
  renderProduct(p);
})();
</script>
