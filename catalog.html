<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<title>Каталог товарів — L-TEX</title>
<meta name="description" content="Каталог секонд-хенду та стоку гуртом — одяг, взуття, аксесуари. Англія, Німеччина, Канада, Польща. Від 10 кг.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design-system.css">
<link rel="stylesheet" href="assets/components.css?v=20260518c">
</head>
<body>

<header data-ltex-header data-active="catalog"></header>

<main class="container" style="padding-top:1.5rem;padding-bottom:3rem">

  <!-- Breadcrumbs -->
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol id="bcList">
      <li><a href="index.html">Головна</a></li>
      <li id="bcCatalog">Каталог</li>
    </ol>
  </nav>

  <!-- Title + counter + layout toggle -->
  <div class="catalog-toolbar" style="margin-top:1rem">
    <div>
      <h1 class="h1" id="pageTitle">Каталог</h1>
      <p class="text-muted text-sm" id="totalCount" style="margin-top:.25rem">Завантаження…</p>
    </div>
    <div class="flex items-center gap-2">
      <button class="filter-trigger lg:hidden" id="openFilters" type="button">
        <span class="icon icon-sm" data-icon="filter"></span>
        Фільтри
        <span class="badge" id="filterBadge" style="display:none">0</span>
      </button>
      <select class="filter-select" id="sortSelect" style="width:auto;min-width:11rem" aria-label="Сортування">
        <option value="">За замовчуванням</option>
        <option value="newest">Спочатку нові</option>
        <option value="price_asc">Ціна: дешевше</option>
        <option value="price_desc">Ціна: дорожче</option>
        <option value="name_asc">Назва А–Я</option>
      </select>
      <div class="layout-toggle" role="tablist" aria-label="Вигляд">
        <button id="vGrid" class="active" type="button" aria-label="Сітка"><span class="icon icon-sm" data-icon="layoutGrid"></span></button>
        <button id="vList" type="button" aria-label="Список"><span class="icon icon-sm" data-icon="list"></span></button>
      </div>
      <button class="icon-btn" data-share type="button" aria-label="Поділитися" title="Поділитися" style="border:1px solid var(--border);width:2.5rem;height:2.5rem">
        <span class="icon icon-sm" data-icon="share"></span>
      </button>
    </div>
  </div>

  <!-- Subcategory pills -->
  <div class="flex flex-wrap gap-2" id="pills" style="margin-top:1rem"></div>

  <!-- Active filters chips -->
  <div class="active-filters" id="activeFilters" style="margin-top:1rem;display:none"></div>

  <!-- Layout: aside + main -->
  <div class="flex flex-col lg:flex-row gap-6" style="margin-top:1.5rem">
    <!-- Desktop sidebar -->
    <aside class="filters-aside" aria-label="Фільтри">
      <div class="filters-aside__inner" id="filtersDesktop"></div>
    </aside>

    <!-- Main grid -->
    <div class="min-w-0 flex-1">
      <div id="grid" class="products-grid" aria-live="polite"></div>
      <div id="pagination" class="pagination" style="display:none"></div>
    </div>
  </div>
</main>

<!-- Mobile filters drawer -->
<div class="filters-mobile" id="filtersMobile" role="dialog" aria-label="Фільтри" aria-hidden="true">
  <div class="filters-mobile__panel">
    <div class="filters-mobile__head">
      <h3 class="h3">Фільтри</h3>
      <button class="icon-btn" id="closeFilters" type="button" aria-label="Закрити"><span class="icon" data-icon="x"></span></button>
    </div>
    <div class="filters-mobile__body" id="filtersMobileBody"></div>
    <div class="filters-mobile__foot">
      <button class="btn btn-outline flex-1" id="resetFiltersMobile" type="button">Скинути</button>
      <button class="btn btn-primary flex-1" id="applyFiltersMobile" type="button">Показати</button>
    </div>
  </div>
</div>

<footer data-ltex-footer></footer>

<script>
/* Cache-bust data files on every load (CDN + browser cache made fresh
   uploads invisible until Ctrl+Shift+R). */
(function(){ var v = Date.now();
  ['data/meta.js','data/images.js','data/details.js','data/products.js','data/lots.js']
    .forEach(function(s){ document.write('<script src="' + s + '?v=' + v + '"><' + '/script>'); });
})();
</script>
<script src="assets/icons.js"></script>
<script src="assets/utils.js?v=20260518c"></script>
<script src="assets/wishlist.js"></script>
<script src="assets/search.js"></script>
<script src="assets/order-modal.js?v=20260518c"></script>
<script src="assets/video-modal.js"></script>
<script src="assets/share.js"></script>
<script src="assets/seo.js"></script>
<script src="assets/header.js?v=20260518c"></script>
<script>
/* ============= Catalog page logic ============= */
(() => {
  const L = window.LTEX;
  const ICONS = window.ICONS;

  /* Replace static [data-icon] markers with rendered SVGs */
  document.querySelectorAll('[data-icon]').forEach(el => {
    const name = el.dataset.icon;
    if(ICONS[name]) el.innerHTML = ICONS[name]();
  });

  /* === State === */
  const state = {
    cat: null,           // top-level category (e.g. 'Одяг')
    sub: null,           // subcategory name
    quality: [],         // multi: ['Екстра','1й сорт', ...]
    season: [],
    audience: [],
    country: [],
    unit: '',
    inStock: false,
    sale: false,
    onlyNew: false,
    priceMin: null, priceMax: null,
    weightMin: null, weightMax: null,
    q: '',
    sort: '',
    layout: 'grid',
    page: 1,
  };

  /* === Read URL into state === */
  function readUrl(){
    const p = L.getParams();
    state.cat = p.cat || null;
    state.sub = p.sub || null;
    state.quality = (p.quality || '').split(',').filter(Boolean);
    state.season = (p.season || '').split(',').filter(Boolean);
    state.audience = (p.audience || '').split(',').filter(Boolean);
    state.country = (p.country || '').split(',').filter(Boolean);
    state.unit = p.unit || '';
    state.inStock = p.inStock === '1' || p.inStock === 'true';
    state.sale = p.sale === '1' || p.sale === 'true';
    state.onlyNew = p.new === '1' || p.new === 'true';
    state.priceMin = p.priceMin ? parseFloat(p.priceMin) : null;
    state.priceMax = p.priceMax ? parseFloat(p.priceMax) : null;
    state.weightMin = p.weightMin ? parseFloat(p.weightMin) : null;
    state.weightMax = p.weightMax ? parseFloat(p.weightMax) : null;
    state.q = p.q || '';
    state.sort = p.sort || '';
    state.layout = p.layout === 'list' ? 'list' : 'grid';
    state.page = Math.max(1, parseInt(p.page || '1', 10) || 1);
  }

  /* === Sync state to URL === */
  function pushUrl(){
    const patch = {
      cat: state.cat, sub: state.sub,
      quality: state.quality, season: state.season,
      audience: state.audience, country: state.country,
      unit: state.unit || '',
      inStock: state.inStock ? '1' : '',
      sale: state.sale ? '1' : '',
      new: state.onlyNew ? '1' : '',
      priceMin: state.priceMin || '',
      priceMax: state.priceMax || '',
      weightMin: state.weightMin || '',
      weightMax: state.weightMax || '',
      q: state.q,
      sort: state.sort,
      layout: state.layout === 'list' ? 'list' : '',
      page: state.page > 1 ? state.page : '',
    };
    L.setParams(patch, true);
  }

  /* === Filter pipeline === */
  function applyFilters(products){
    let list = products;
    if(state.cat) list = list.filter(p => p.topCat === state.cat);
    if(state.sub) list = list.filter(p => p.subcat === state.sub || p.category === state.sub);
    if(state.quality.length) list = list.filter(p => state.quality.includes(p.sort));
    if(state.season.length) list = list.filter(p => state.season.includes(p.season));
    if(state.audience.length) list = list.filter(p => state.audience.includes(p.audience));
    if(state.country.length) list = list.filter(p => state.country.includes(p.country));
    if(state.unit) list = list.filter(p => p.unit === state.unit);
    if(state.inStock) list = list.filter(p => p.inStock);
    if(state.sale) list = list.filter(p => L.hasDiscount(p));
    if(state.onlyNew) list = list.filter(p => p.isNew);
    if(state.priceMin != null) list = list.filter(p => (p.priceEur || 0) >= state.priceMin);
    if(state.priceMax != null) list = list.filter(p => (p.priceEur || 0) <= state.priceMax);
    if(state.weightMin != null) list = list.filter(p => parseFloat(String(p.weight).replace(',', '.')) >= state.weightMin);
    if(state.weightMax != null) list = list.filter(p => parseFloat(String(p.weight).replace(',', '.')) <= state.weightMax);
    if(state.q){
      const r = L.search(state.q, { products: list, minScore: 0.4 });
      return r.map(x => x.p);
    }
    /* Sort */
    const sortBy = state.sort;
    if(sortBy === 'price_asc') list = [...list].sort((a,b) => (a.priceEur||1e9) - (b.priceEur||1e9));
    else if(sortBy === 'price_desc') list = [...list].sort((a,b) => (b.priceEur||0) - (a.priceEur||0));
    else if(sortBy === 'name_asc') list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'uk'));
    else if(sortBy === 'newest') list = [...list].sort((a,b) => parseInt(b.id) - parseInt(a.id));
    return list;
  }

  /* === Card render === */
  function renderProductCard(p){
    const wished = L.wishlist.has(p.id);
    const inCart = L.cart.has(p.id);
    const img = p.thumb || p.image;
    const isAkciya = L.hasDiscount(p);
    const lotsCount = L.lotsForProduct(p.id).length;
    const isNew = !!p.isNew;
    const tags = [];
    if(p.sort) tags.push(`<span class="badge-pill">${L.escapeHtml(p.sort)}</span>`);
    if(p.season) tags.push(`<span class="badge-pill">${L.escapeHtml(p.season)}</span>`);
    if(p.country) tags.push(`<span class="badge-pill">${L.COUNTRY_FLAG[p.country]||''} ${L.escapeHtml(p.country)}</span>`);
    if(p.audience && p.audience !== 'Мікс') tags.push(`<span class="badge-pill">${L.escapeHtml(p.audience)}</span>`);

    const priceMain = p.priceUah != null ? L.formatUah(p.priceUah) : '—';
    const priceEur = p.priceEur != null ? L.formatEur(p.priceEur) : '';
    const oldPrice = p.oldPriceUah != null ? `<span class="product-card__price-old">${L.formatUah(p.oldPriceUah)}</span>` : '';

    const isList = state.layout === 'list';
    return `<article class="product-card ${isAkciya ? 'akciya' : ''} ${isList ? 'list' : ''}" data-id="${p.id}">
      <a href="${L.productHref(p.id)}" class="product-card__media-link" aria-label="${L.escapeHtml(p.name)}">
        <div class="product-card__media">
          ${img
            ? `<img class="product-card__img" src="${img}" data-fallback="${p.image||''}" alt="${L.escapeHtml(p.name)}" loading="lazy" decoding="async" onerror="if(this.dataset.fallback&&this.src!==this.dataset.fallback){this.src=this.dataset.fallback;return;}this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="product-card__media-empty" style="display:none"><span class="icon" data-icon="video"></span><span class="text-xs">Зображення невдовзі</span></div>`
            : `<div class="product-card__media-empty"><span class="icon" data-icon="video"></span><span class="text-xs">Зображення невдовзі</span></div>`}
          <div class="product-card__badges">
            ${isNew ? `<span class="tag tag-new">NEW</span>` : ''}
            ${isAkciya ? `<span class="tag tag-sale">SALE${p.discount ? ' −' + p.discount + '%' : ''}</span>` : ''}
            ${lotsCount ? `<span class="tag" style="background:var(--green-700);color:#fff">📦 ${lotsCount}</span>` : ''}
          </div>
          ${p.youtube ? `<button class="product-card__video" type="button" data-video="${L.escapeHtml(L.youtubeWatchUrl(p.youtube))}" data-video-title="${L.escapeHtml(p.name)}" aria-label="Переглянути відео"><span class="icon icon-sm" data-icon="play"></span>Відео</button>` : ''}
        </div>
      </a>
      <button class="product-card__wish ${wished ? 'active' : ''}" data-wish="${p.id}" aria-label="${wished ? 'Прибрати з обраного' : 'Додати в обране'}" type="button">
        <span class="icon icon-sm">${wished ? ICONS.heartFilled() : ICONS.heart()}</span>
      </button>
      <div class="product-card__body">
        <a href="${L.productHref(p.id)}" class="product-card__title">${L.escapeHtml(p.name)}</a>
        ${tags.length ? `<div class="product-card__tags">${tags.join('')}</div>` : ''}
        ${isList && p.subcat ? `<div class="product-card__sub">${L.escapeHtml(p.subcat)}</div>` : ''}
        <div class="product-card__price-block">
          <div class="product-card__price">
            ${priceMain}<span class="unit">/${p.unit||'кг'}</span>
            ${oldPrice}
          </div>
          ${priceEur ? `<div class="product-card__price-eur">${priceEur}</div>` : ''}
        </div>
        ${isList ? `<div class="flex flex-wrap gap-2" style="margin-top:.75rem">
          <a class="btn btn-outline-primary btn-sm" href="${L.productHref(p.id)}">Детальніше →</a>
          ${lotsCount ? `<a class="btn btn-primary btn-sm" href="${L.lotsForProductHref(p.id)}">📦 Лоти (${lotsCount})</a>` : ''}
          <button class="btn btn-outline btn-sm" type="button" data-order-id="${p.id}">📩 Запит</button>
        </div>` : ''}
      </div>
    </article>`;
  }

  /* === Filters render === */
  const FACETS = [
    { key:'quality',  title:'Якість',   src: () => ['Екстра','Крем','1й сорт','2й сорт','Сток','Мікс'] },
    { key:'season',   title:'Сезон',    src: () => ['Зима','Літо','Демісезон','Всесезонне'] },
    { key:'audience', title:'Стать',    src: () => ['Жіноче','Чоловіче','Дитяче','Дорослі','Мікс'] },
    { key:'country',  title:'Країна',   src: () => ['Англія','Німеччина','Канада','Польща','Італія','Шотландія'] },
  ];

  function buildFiltersHTML(){
    const blocks = [];
    /* Search */
    blocks.push(`
      <div class="filter-block">
        <div class="filter-block__title">Пошук</div>
        <div style="position:relative">
          <input type="search" id="fSearch" class="filter-select" placeholder="Назва, ID, бренд…" value="${L.escapeHtml(state.q)}">
        </div>
      </div>
    `);
    /* Quick status pills — sale / new / in-stock */
    blocks.push(`
      <div class="filter-block">
        <div class="filter-block__title">Статус</div>
        <div class="status-pills">
          <button type="button" class="status-pill sale ${state.sale ? 'active' : ''}" data-toggle="sale" aria-pressed="${state.sale ? 'true' : 'false'}">
            <span>🔥</span><span>Акційні</span>
          </button>
          <button type="button" class="status-pill new ${state.onlyNew ? 'active' : ''}" data-toggle="new" aria-pressed="${state.onlyNew ? 'true' : 'false'}">
            <span>🆕</span><span>Новинки</span>
          </button>
          <button type="button" class="status-pill stock ${state.inStock ? 'active' : ''}" data-toggle="inStock" aria-pressed="${state.inStock ? 'true' : 'false'}">
            <span>✓</span><span>В наявності</span>
          </button>
        </div>
      </div>
    `);
    /* Categories quick links */
    if(!state.cat){
      const counts = L.topCatCounts();
      blocks.push(`
        <div class="filter-block">
          <div class="filter-block__title">Категорія</div>
          <div class="filter-options">
            ${L.TOP_CATS.filter(c => counts.get(c)).map(c => `
              <label class="filter-option">
                <input type="radio" name="fCat" value="${L.escapeHtml(c)}" ${state.cat === c ? 'checked' : ''} style="appearance:auto;width:auto;height:auto;border:none">
                <span>${L.escapeHtml(c)}</span>
                <span class="filter-option__count">${counts.get(c) || 0}</span>
              </label>
            `).join('')}
          </div>
        </div>
      `);
    }
    /* Multi-checkboxes */
    for(const facet of FACETS){
      const opts = facet.src();
      blocks.push(`
        <div class="filter-block">
          <div class="filter-block__title">${facet.title}</div>
          <div class="filter-options">
            ${opts.map(opt => `
              <label class="filter-option">
                <input type="checkbox" data-facet="${facet.key}" value="${L.escapeHtml(opt)}" ${(state[facet.key]||[]).includes(opt) ? 'checked' : ''}>
                <span>${L.escapeHtml(opt)}</span>
              </label>
            `).join('')}
          </div>
        </div>
      `);
    }
    /* Unit */
    blocks.push(`
      <div class="filter-block">
        <div class="filter-block__title">Одиниця</div>
        <select class="filter-select" id="fUnit">
          <option value="">Всі</option>
          <option value="кг" ${state.unit === 'кг' ? 'selected' : ''}>За кг</option>
          <option value="шт" ${state.unit === 'шт' ? 'selected' : ''}>За шт</option>
        </select>
      </div>
    `);
    /* Price */
    blocks.push(`
      <div class="filter-block">
        <div class="filter-block__title">Ціна, €</div>
        <div class="filter-range">
          <input type="number" id="fPriceMin" placeholder="від" min="0" step="0.1" value="${state.priceMin || ''}">
          <span>—</span>
          <input type="number" id="fPriceMax" placeholder="до" min="0" step="0.1" value="${state.priceMax || ''}">
        </div>
      </div>
    `);
    /* Weight */
    blocks.push(`
      <div class="filter-block">
        <div class="filter-block__title">Вага лоту, кг</div>
        <div class="filter-range">
          <input type="number" id="fWeightMin" placeholder="від" min="0" step="1" value="${state.weightMin || ''}">
          <span>—</span>
          <input type="number" id="fWeightMax" placeholder="до" min="0" step="1" value="${state.weightMax || ''}">
        </div>
      </div>
    `);
    /* Reset */
    blocks.push(`
      <div class="filter-block">
        <button class="btn btn-outline w-full" id="fReset" type="button">Скинути всі фільтри</button>
      </div>
    `);
    return blocks.join('');
  }

  function bindFilters(root){
    /* Search input */
    const fs = root.querySelector('#fSearch');
    if(fs){
      fs.addEventListener('input', L.debounce(() => {
        state.q = fs.value.trim();
        state.page = 1;
        pushUrl(); render();
      }, 250));
    }
    /* Cat radios */
    root.querySelectorAll('input[name=fCat]').forEach(r => {
      r.addEventListener('change', () => {
        state.cat = r.value || null;
        state.sub = null;
        state.page = 1;
        pushUrl(); render();
      });
    });
    /* Multi facets */
    root.querySelectorAll('input[type=checkbox][data-facet]').forEach(cb => {
      cb.addEventListener('change', () => {
        const facet = cb.dataset.facet;
        const arr = state[facet] || [];
        const v = cb.value;
        if(cb.checked){ if(!arr.includes(v)) arr.push(v); }
        else { state[facet] = arr.filter(x => x !== v); }
        state[facet] = state[facet] || arr;
        state.page = 1;
        pushUrl(); render();
      });
    });
    /* Unit */
    root.querySelector('#fUnit')?.addEventListener('change', e => {
      state.unit = e.target.value || '';
      state.page = 1; pushUrl(); render();
    });
    /* Price */
    const fpmin = root.querySelector('#fPriceMin');
    const fpmax = root.querySelector('#fPriceMax');
    [fpmin, fpmax].forEach(el => el?.addEventListener('change', () => {
      state.priceMin = fpmin?.value ? parseFloat(fpmin.value) : null;
      state.priceMax = fpmax?.value ? parseFloat(fpmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));
    /* Weight */
    const fwmin = root.querySelector('#fWeightMin');
    const fwmax = root.querySelector('#fWeightMax');
    [fwmin, fwmax].forEach(el => el?.addEventListener('change', () => {
      state.weightMin = fwmin?.value ? parseFloat(fwmin.value) : null;
      state.weightMax = fwmax?.value ? parseFloat(fwmax.value) : null;
      state.page = 1; pushUrl(); render();
    }));
    /* Status pills */
    root.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.toggle;
        if(k === 'sale') state.sale = !state.sale;
        else if(k === 'new') state.onlyNew = !state.onlyNew;
        else if(k === 'inStock') state.inStock = !state.inStock;
        state.page = 1; pushUrl(); render();
      });
    });
    /* Reset */
    root.querySelector('#fReset')?.addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[],
        unit:'', inStock:false, sale:false, onlyNew:false,
        priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', sort:'', page:1
      });
      pushUrl(); render();
    });
  }

  /* === Pills === */
  function renderPills(){
    const pillsEl = document.getElementById('pills');
    if(!state.cat){
      pillsEl.innerHTML = L.TOP_CATS.map(c => {
        const count = L.topCatCounts().get(c) || 0;
        if(!count) return '';
        return `<a href="${L.catalogHref({cat:c})}" class="chip">${L.escapeHtml(c)} <span class="text-muted">${count}</span></a>`;
      }).join('');
      return;
    }
    const subs = L.subcatsForTop(state.cat);
    const all = `<a href="${L.catalogHref({cat:state.cat})}" class="chip ${!state.sub?'active':''}">Усі</a>`;
    pillsEl.innerHTML = all + subs.map(s => {
      const cls = state.sub === s.name ? 'chip active' : 'chip';
      return `<a href="${L.catalogHref({cat:state.cat, sub:s.name})}" class="${cls}">${L.escapeHtml(s.name)} <span class="text-muted">${s.count}</span></a>`;
    }).join('');
  }

  /* === Active filters summary === */
  function renderActive(){
    const af = document.getElementById('activeFilters');
    const chips = [];
    const removeArr = (key, val) => () => {
      state[key] = state[key].filter(x => x !== val); state.page = 1; pushUrl(); render();
    };
    state.quality.forEach(v => chips.push({label:`Якість: ${v}`, k:'quality', v}));
    state.season.forEach(v => chips.push({label:`Сезон: ${v}`, k:'season', v}));
    state.audience.forEach(v => chips.push({label:`Стать: ${v}`, k:'audience', v}));
    state.country.forEach(v => chips.push({label:`Країна: ${v}`, k:'country', v}));
    if(state.unit) chips.push({label:`За ${state.unit}`, k:'unit'});
    if(state.inStock) chips.push({label:'В наявності', k:'inStock'});
    if(state.sale) chips.push({label:'🔥 Акції', k:'sale'});
    if(state.onlyNew) chips.push({label:'🆕 Новинки', k:'onlyNew'});
    if(state.priceMin != null) chips.push({label:`від €${state.priceMin}`, k:'priceMin'});
    if(state.priceMax != null) chips.push({label:`до €${state.priceMax}`, k:'priceMax'});
    if(state.weightMin != null) chips.push({label:`вага від ${state.weightMin}кг`, k:'weightMin'});
    if(state.weightMax != null) chips.push({label:`вага до ${state.weightMax}кг`, k:'weightMax'});
    if(state.q) chips.push({label:`«${state.q}»`, k:'q'});
    if(!chips.length){ af.style.display='none'; return; }
    af.style.display='flex';
    af.innerHTML = chips.map((c,i) => `<span class="active-filter">${L.escapeHtml(c.label)} <button data-chip="${i}" aria-label="Прибрати" type="button">✕</button></span>`).join('') +
      `<button class="active-filter" id="clearAll" type="button" style="background:#fff;border-color:var(--border);color:var(--gray-700)">Скинути все ✕</button>`;
    af.querySelectorAll('[data-chip]').forEach((btn,i) => {
      btn.addEventListener('click', () => {
        const c = chips[parseInt(btn.dataset.chip)];
        if(['quality','season','audience','country'].includes(c.k)) state[c.k] = state[c.k].filter(x => x !== c.v);
        else if(c.k === 'unit') state.unit = '';
        else if(c.k === 'inStock') state.inStock = false;
        else if(c.k === 'sale') state.sale = false;
        else if(c.k === 'onlyNew') state.onlyNew = false;
        else if(c.k === 'priceMin') state.priceMin = null;
        else if(c.k === 'priceMax') state.priceMax = null;
        else if(c.k === 'weightMin') state.weightMin = null;
        else if(c.k === 'weightMax') state.weightMax = null;
        else if(c.k === 'q') state.q = '';
        state.page = 1; pushUrl(); render();
      });
    });
    af.querySelector('#clearAll').addEventListener('click', () => {
      Object.assign(state, {
        quality:[], season:[], audience:[], country:[], unit:'', inStock:false, sale:false, onlyNew:false,
        priceMin:null, priceMax:null, weightMin:null, weightMax:null, q:'', page:1
      });
      pushUrl(); render();
    });
  }

  function activeCount(){
    return state.quality.length + state.season.length + state.audience.length + state.country.length
      + (state.unit?1:0) + (state.inStock?1:0) + (state.sale?1:0) + (state.onlyNew?1:0)
      + (state.priceMin!=null?1:0) + (state.priceMax!=null?1:0)
      + (state.weightMin!=null?1:0) + (state.weightMax!=null?1:0) + (state.q?1:0);
  }

  /* === Pagination === */
  function renderPagination(total){
    const el = document.getElementById('pagination');
    const pages = Math.ceil(total / L.CONFIG.PER_PAGE);
    if(pages <= 1){ el.style.display='none'; return; }
    el.style.display='flex';
    const cur = state.page;
    const around = (n) => Math.abs(n - cur) <= 2;
    const items = [];
    items.push(`<a class="${cur===1?'disabled':''}" data-page="${Math.max(1,cur-1)}" aria-label="Попередня">${ICONS.chevronLeft({size:16})}</a>`);
    for(let n = 1; n <= pages; n++){
      if(n === 1 || n === pages || around(n)){
        items.push(`<a class="${n===cur?'current':''}" data-page="${n}">${n}</a>`);
      } else if(n === 2 && cur > 4){
        items.push(`<span class="gap">…</span>`);
      } else if(n === pages - 1 && cur < pages - 3){
        items.push(`<span class="gap">…</span>`);
      }
    }
    items.push(`<a class="${cur===pages?'disabled':''}" data-page="${Math.min(pages,cur+1)}" aria-label="Наступна">${ICONS.chevronRight({size:16})}</a>`);
    el.innerHTML = items.join('');
    el.querySelectorAll('[data-page]').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      state.page = parseInt(a.dataset.page);
      pushUrl(); render(); window.scrollTo({top:0, behavior:'smooth'});
    }));
  }

  /* === Title / breadcrumbs === */
  function renderTitleAndCrumbs(){
    const titleEl = document.getElementById('pageTitle');
    let title;
    if(state.onlyNew && !state.cat && !state.sub) title = '🆕 Новинки';
    else if(state.sale && !state.cat && !state.sub) title = '🔥 Акції';
    else if(state.sub) title = state.sub;
    else if(state.cat) title = state.cat;
    else title = 'Каталог';
    titleEl.textContent = title;

    document.title = title + ' — L-TEX';

    const ol = document.getElementById('bcList');
    let html = `<li><a href="index.html">Головна</a></li>`;
    if(state.onlyNew) html += `<li><a href="catalog.html">Каталог</a></li><li>Новинки</li>`;
    else if(state.sale) html += `<li><a href="catalog.html">Каталог</a></li><li>Акції</li>`;
    else if(!state.cat) html += `<li>Каталог</li>`;
    else {
      html += `<li><a href="catalog.html">Каталог</a></li>`;
      if(!state.sub) html += `<li>${L.escapeHtml(state.cat)}</li>`;
      else {
        html += `<li><a href="${L.catalogHref({cat:state.cat})}">${L.escapeHtml(state.cat)}</a></li>`;
        html += `<li>${L.escapeHtml(state.sub)}</li>`;
      }
    }
    ol.innerHTML = html;

    /* Highlight matching nav link in header */
    document.querySelectorAll('.site-header__nav a, .mobile-menu__nav a').forEach(a => {
      const href = a.getAttribute('href') || '';
      if(state.onlyNew && href.includes('new=1')) a.classList.add('active');
      else if(state.sale && href.includes('sale=1')) a.classList.add('active');
      else if(href.includes('new=1') || href.includes('sale=1')) a.classList.remove('active');
    });
  }

  /* === Main render === */
  function render(){
    const all = L.getProducts();
    const filtered = applyFilters(all);
    const total = filtered.length;

    document.getElementById('totalCount').textContent = `${total} ${plural(total)}`;
    renderTitleAndCrumbs();
    renderPills();
    renderActive();
    updateSeo(filtered);

    const filterBadge = document.getElementById('filterBadge');
    const cnt = activeCount();
    if(cnt){ filterBadge.textContent = cnt; filterBadge.style.display='inline-flex'; }
    else filterBadge.style.display='none';

    /* Layout switch */
    const grid = document.getElementById('grid');
    grid.className = state.layout === 'list' ? 'products-list' : 'products-grid';
    document.getElementById('vGrid').classList.toggle('active', state.layout !== 'list');
    document.getElementById('vList').classList.toggle('active', state.layout === 'list');
    document.getElementById('sortSelect').value = state.sort;

    /* Page slice */
    const start = (state.page - 1) * L.CONFIG.PER_PAGE;
    const slice = filtered.slice(start, start + L.CONFIG.PER_PAGE);

    if(!slice.length){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Нічого не знайдено</h3><p>Спробуйте змінити фільтри або пошуковий запит</p></div>`;
    } else {
      grid.innerHTML = slice.map(renderProductCard).join('');
      grid.querySelectorAll('[data-icon]').forEach(el => {
        const n = el.dataset.icon;
        if(ICONS[n]) el.innerHTML = ICONS[n]();
      });
      grid.querySelectorAll('[data-wish]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          const id = btn.dataset.wish;
          const p = L.findProduct(id);
          const nowOn = L.wishlist.toggle(id, p?.name);
          btn.classList.toggle('active', nowOn);
          btn.querySelector('.icon').innerHTML = nowOn ? ICONS.heartFilled({size:16}) : ICONS.heart({size:16});
          btn.setAttribute('aria-label', nowOn ? 'Прибрати з обраного' : 'Додати в обране');
        });
      });
      grid.querySelectorAll('[data-add-cart]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const id = btn.dataset.addCart;
          const p = L.findProduct(id);
          if(L.cart.has(id)){ location.href = 'cart.html'; return; }
          L.cart.add(id, 1, p?.name);
          btn.innerHTML = `<span class="icon icon-sm">${ICONS.check({size:16})}</span> У кошику`;
        });
      });
      grid.querySelectorAll('[data-order-id]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault();
          const p = L.findProduct(btn.dataset.orderId);
          if(!p) return;
          const lines = [`Товар: ${p.name}`, `Артикул: ${String(p.id).padStart(4,'0')}`];
          if(p.priceUah) lines.push(`Ціна: ${L.formatUah(p.priceUah)}/${p.unit||'кг'}`);
          if(p.weight) lines.push(`Вага: ${p.weight} ${p.unit||'кг'}`);
          L.openOrderModal({
            title: '📩 Запит по товару',
            subject: `Запит: ${p.name}`,
            intent: 'order',
            presetText: lines.join('\n'),
          });
        });
      });
    }

    renderPagination(total);
  }

  function plural(n){
    const ten = n % 100;
    if(ten >= 11 && ten <= 14) return 'товарів';
    const o = n % 10;
    if(o === 1) return 'товар';
    if(o >= 2 && o <= 4) return 'товари';
    return 'товарів';
  }

  function updateSeo(filtered){
    let title, description, image;
    if(state.onlyNew){
      title = 'Новинки каталогу — L-TEX';
      description = `Свіжі надходження секонд-хенду і стоку. ${filtered.length} ${plural(filtered.length)} нових позицій. Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг.`;
    } else if(state.sale){
      title = 'Акційні товари — L-TEX';
      description = `Знижки на гуртові партії: ${filtered.length} ${plural(filtered.length)} зі знижкою. Англія · Німеччина · Канада · Польща.`;
    } else if(state.sub){
      title = `${state.sub} — каталог L-TEX`;
      description = `${state.sub}: ${filtered.length} ${plural(filtered.length)} в наявності. Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг, відеоогляди лотів. Доставка по Україні.`;
    } else if(state.cat){
      title = `${state.cat} — каталог L-TEX`;
      description = `${state.cat}: ${filtered.length} ${plural(filtered.length)} в наявності. Англія · Німеччина · Канада · Польща. Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг.`;
    } else {
      title = `Каталог товарів — ${L.getProducts().length}+ позицій — L-TEX`;
      description = `Каталог секонд-хенду та стоку: одяг, взуття, аксесуари, дім та побут. Англія · Німеччина · Канада · Польща. Гуртом від ${L.CONFIG.MIN_ORDER_KG} кг.`;
    }
    image = filtered[0] && (filtered[0].thumb || filtered[0].image);
    L.SEO.setMeta({ title, description, image, type: 'website' });

    /* Breadcrumbs */
    const crumbs = [{ name: 'Головна', url: '/' }];
    if(state.onlyNew){ crumbs.push({ name: 'Каталог', url: '/catalog.html' }); crumbs.push({ name: 'Новинки', url: '/catalog.html?new=1' }); }
    else if(state.sale){ crumbs.push({ name: 'Каталог', url: '/catalog.html' }); crumbs.push({ name: 'Акції', url: '/catalog.html?sale=1' }); }
    else if(state.cat){
      crumbs.push({ name: 'Каталог', url: '/catalog.html' });
      crumbs.push({ name: state.cat, url: L.catalogHref({cat: state.cat}) });
      if(state.sub) crumbs.push({ name: state.sub, url: L.catalogHref({cat: state.cat, sub: state.sub}) });
    } else {
      crumbs.push({ name: 'Каталог', url: '/catalog.html' });
    }
    L.SEO.setBreadcrumbs(crumbs);
    L.SEO.setItemList(filtered, title);
  }

  /* === Boot === */
  function init(){
    readUrl();
    /* Wait for header to render so search input ID won't conflict */
    document.getElementById('vGrid').addEventListener('click', () => {
      state.layout = 'grid'; pushUrl(); render();
    });
    document.getElementById('vList').addEventListener('click', () => {
      state.layout = 'list'; pushUrl(); render();
    });
    document.getElementById('sortSelect').addEventListener('change', e => {
      state.sort = e.target.value; state.page = 1; pushUrl(); render();
    });

    /* Render desktop filters */
    const dRoot = document.getElementById('filtersDesktop');
    dRoot.innerHTML = buildFiltersHTML();
    bindFilters(dRoot);

    /* Mobile filters */
    const mRoot = document.getElementById('filtersMobileBody');
    const mobile = document.getElementById('filtersMobile');
    document.getElementById('openFilters').addEventListener('click', () => {
      mRoot.innerHTML = buildFiltersHTML();
      bindFilters(mRoot);
      mobile.classList.add('open'); mobile.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
    });
    const closeMob = () => { mobile.classList.remove('open'); mobile.setAttribute('aria-hidden','true'); document.body.style.overflow=''; };
    document.getElementById('closeFilters').addEventListener('click', closeMob);
    mobile.addEventListener('click', e => { if(e.target === mobile) closeMob(); });
    document.getElementById('applyFiltersMobile').addEventListener('click', closeMob);
    document.getElementById('resetFiltersMobile').addEventListener('click', () => {
      Object.assign(state, {
        cat:null, sub:null, quality:[], season:[], audience:[], country:[],
        unit:'', inStock:false, sale:false, onlyNew:false,
        priceMin:null, priceMax:null, weightMin:null, weightMax:null,
        q:'', sort:'', page:1
      });
      pushUrl(); render();
      mRoot.innerHTML = buildFiltersHTML();
      bindFilters(mRoot);
    });

    /* URL changes (back/forward) */
    window.addEventListener('popstate', () => { readUrl(); render(); });
    window.addEventListener('ltex:rate-changed', render);
    window.addEventListener('ltex:wishlist-changed', () => {
      /* keep wish-state badges in sync without re-rendering all */
      document.querySelectorAll('[data-wish]').forEach(btn => {
        const on = L.wishlist.has(btn.dataset.wish);
        btn.classList.toggle('active', on);
        btn.querySelector('.icon').innerHTML = on ? ICONS.heartFilled({size:16}) : ICONS.heart({size:16});
      });
    });

    render();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
